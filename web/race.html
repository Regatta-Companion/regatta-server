<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regatta Screen — Race</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    .race-detail {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 24px 80px;
      width: 100%;
    }

    .race-detail .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .race-detail .breadcrumb a { color: var(--muted); }
    .race-detail .breadcrumb a:hover { color: var(--fg); }

    .race-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .race-header h2 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .race-header .race-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .series-switcher { margin-top: 10px; }
    .series-switcher select:focus { outline: none; border-color: var(--accent); }

    .race-header .race-actions { display: flex; gap: 8px; }

    /* ── Map + data grid ── */
    .map-section {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 16px;
      margin-bottom: 24px;
    }

    .map-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .map-container #map {
      width: 100%;
      height: 420px;
      background: var(--bg);
    }

    .map-sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .info-panel h4 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-cell .val {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .info-cell .lbl {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Speed chart ── */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .chart-section .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .chart-section .chart-header h4 {
      font-size: 13px;
      font-weight: 600;
    }

    .chart-section canvas {
      width: 100%;
      height: 200px;
      display: block;
      border-radius: var(--radius-sm);
    }

    /* ── Boat list ── */
    .boat-list { margin-bottom: 0; }

    .boat-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      gap: 12px;
    }
    .boat-item:last-child { border-bottom: none; }
    .boat-item:hover {
      background: color-mix(in oklch, var(--border), transparent 70%);
      margin: 0 -14px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
    }

    .boat-item .boat-color {
      width: 4px;
      height: 32px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .boat-item .boat-info { flex: 1; min-width: 0; }
    .boat-item .boat-name {
      font-weight: 600;
      font-size: 15px;
    }
    .boat-item .boat-meta {
      font-size: 11px;
      color: var(--muted);
    }

    .boat-item .boat-stats {
      display: flex;
      gap: 14px;
      flex-shrink: 0;
    }

    .boat-item .boat-s { text-align: right; }
    .boat-item .boat-s .v {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .boat-item .boat-s .l {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .active-boat {
      background: color-mix(in oklch, var(--accent-light), transparent 70%) !important;
      border-radius: var(--radius-sm);
      margin: 0 -14px;
      padding: 10px 14px;
    }

    /* Boat tooltip styling */
    .boat-tooltip {
      background: rgba(0,0,0,0.75) !important;
      border: none !important;
      border-radius: 6px !important;
      color: #fff !important;
      font-family: var(--font-mono) !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      padding: 4px 8px !important;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2) !important;
    }
    .boat-tooltip::before { display: none !important; }

    /* Boat icon — remove default Leaflet styling */
    .boat-icon {
      background: transparent !important;
      border: none !important;
    }
    .boat-marker-icon {
      transition: transform 0.08s linear !important;
    }
    .boat-icon-svg {
      transition: transform 0.08s linear;
    }

    /* ── Playback controls ── */
    .playback-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .playback-bar .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 16px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .playback-bar .play-btn:hover { background: oklch(38% 0.14 260); }

    .playback-bar .time-display {
      font-family: var(--font-mono);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      min-width: 80px;
    }

    .playback-bar .slider-container { flex: 1; position: relative; }

    .playback-bar input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .playback-bar input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--surface);
      cursor: pointer;
    }

    .playback-bar .speed-btn {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-mono);
    }
    .playback-bar .speed-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .loading-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .loading-state .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-size: 14px; }

    .error-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    /* ── Mobile bottom nav ── */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      padding: 6px 0 env(safe-area-inset-bottom, 6px) 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .mobile-nav-inner {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .mobile-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 12px;
      font-size: 10px;
      color: var(--muted);
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: color 0.15s;
      min-width: 56px;
    }
    .mobile-nav a.active { color: var(--accent); }
    .mobile-nav a svg { width: 22px; height: 22px; }

    @media (max-width: 768px) {
      .race-detail { padding: 14px 14px 80px; }
      .map-section { grid-template-columns: 1fr; }
      .map-container #map { height: 320px; }
      .race-header h2 { font-size: 22px; }
      .mobile-nav { display: block; }
      .app-header .nav { display: none; }
    }
  </style>
</head>
<body>
  <header class="app-header"></header>
  <div class="race-detail">
    <div class="breadcrumb">
      <a href="dashboard.html">Wedstrijden</a>
      <span>·</span>
      <span id="breadcrumb-race">Race</span>
    </div>

    <div id="race-content">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Race gegevens laden…</p>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Wedstrijden</span>
      </a>
      <a href="race.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 3"/></svg>
        <span>Race</span>
      </a>
      <a href="race-compare.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 4h4v4"/><path d="M20 4L9 15"/><path d="M8 20H4v-4"/><path d="M4 20l7-7"/></svg>
        <span>Vergelijk</span>
      </a>
    </div>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
  <script>
    requireAuth();
    checkAdmin().then(() => renderHeader('race'));

    const urlParams = new URLSearchParams(window.location.search);
    const trackId = urlParams.get('id');
    const raceId = sessionStorage.getItem('raceId');
    console.log('race.html loaded, raceId from sessionStorage:', raceId);
    const BOAT_COLORS = ['#1d4ed8', '#059669', '#d97706', '#dc2626', '#7c3aed', '#db2777', '#0891b2', '#65a30d'];

    let map;
    let tracks = [];
    let activeTrackIdx = 0;
    let ghostLine = null;
    let trailLine = null;
    let fadeSegments = [];
    let boatMarker = null;
    let playing = false;
    let currentTime = 0;
    let totalDuration = 0;
    let playSpeed = 1;
    let animFrameId = null;
    let lastFrameTs = null;
    let currentClass = null; // selected class name, null = all

    function getAvailableClasses(trackList) {
      const seen = new Set();
      const classes = [];
      for (const t of trackList) {
        const name = t.series_class_name || t.class_name;
        if (name && !seen.has(name)) { seen.add(name); classes.push(name); }
      }
      return classes.sort();
    }

    function findUserClass(trackList) {
      const email = getEmail();
      const userTrack = trackList.find(t => t.user_email === email);
      return userTrack ? (userTrack.series_class_name || userTrack.class_name) : null;
    }

    async function onClassChange(cls) {
      currentClass = cls || null;
      sessionStorage.setItem('compareClass', currentClass || '');
      // Reset to first boat in this class
      const first = tracks.findIndex(t => {
        const name = t.series_class_name || t.class_name;
        return !currentClass || name === currentClass;
      });
      activeTrackIdx = first >= 0 ? first : 0;
      playing = false; if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      currentTime = 0;
      if (document.getElementById('playback-slider')) document.getElementById('playback-slider').value = 0;
      document.getElementById('time-display') && (document.getElementById('time-display').textContent = '00:00');
      await loadTrackOnMap(activeTrackIdx);
      drawSpeedChart(activeTrackIdx);
      updateInfoPanel(activeTrackIdx);
      // Re-render boat list
      const boatList = document.getElementById('boat-list');
      if (boatList) boatList.innerHTML = renderBoatList(tracks);
      // Update class dropdown
      const sel = document.getElementById('class-select');
      if (sel) sel.value = currentClass || '';
      // Rebind click handlers
      document.querySelectorAll('.boat-item').forEach(el => {
        el.addEventListener('click', () => {
          const idx = parseInt(el.dataset.idx);
          selectBoat(idx);
        });
      });
    }

    function switchRace(newRaceId) {
      sessionStorage.setItem('raceId', newRaceId);
      window.location.reload();
    }

    // ── Load: individual track (via ?id=) or race (via sessionStorage) ──
    async function loadRace() {
      const container = document.getElementById('race-content');

      // Check for individual track first
      if (trackId) {
        await loadSingleTrack(trackId, container);
        return;
      }

      if (!raceId) {
        container.innerHTML = '<div class="error-state"><p>Geen race geselecteerd. <a href="dashboard.html">Ga terug</a>.</p></div>';
        return;
      }

      try {
        const race = await apiGet('/races/' + raceId);
        if (!race || race.error) throw new Error(race?.error || 'Niet gevonden');

        // Load series races for dropdown if this race is part of a series
        let seriesRaces = null;
        if (race.series_id) {
          try {
            const series = await apiGet('/series/' + race.series_id);
            seriesRaces = (series && series.races) ? series.races : null;
          } catch (_) {}
        }

        const raceTracks = await apiGet('/races/' + raceId + '/tracks') || [];

        document.getElementById('breadcrumb-race').textContent = race.name || race.label || 'Race #' + raceId;

        tracks = Array.isArray(raceTracks) ? raceTracks : [];

        // Set default class: user's own class, or first available
        const userClass = findUserClass(tracks);
        const allClasses = getAvailableClasses(tracks);
        currentClass = userClass || (allClasses.length > 0 ? allClasses[0] : null);
        sessionStorage.setItem('compareClass', currentClass || '');

        container.innerHTML = buildRaceHTML(race, tracks, seriesRaces);
        initMap();
        // Start with first boat in the selected class
        const firstIdx = tracks.findIndex(t => {
          const name = t.series_class_name || t.class_name;
          return !currentClass || name === currentClass;
        });
        activeTrackIdx = firstIdx >= 0 ? firstIdx : 0;
        await loadTrackOnMap(activeTrackIdx);
        drawSpeedChart(activeTrackIdx);
        updateInfoPanel(activeTrackIdx);

        document.querySelectorAll('.boat-item').forEach(el => {
          el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.idx);
            selectBoat(idx);
          });
        });

        const slider = document.getElementById('playback-slider');
        if (slider) {
          slider.addEventListener('input', () => {
            currentTime = (parseInt(slider.value) / 1000) * totalDuration;
            updateBoatMarker();
            updateTrails();
            updateTimelineUI();
            drawSpeedChart(activeTrackIdx);
          });
        }

        document.querySelectorAll('.speed-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            playSpeed = parseFloat(btn.dataset.speed);
          });
        });

        document.getElementById('play-btn')?.addEventListener('click', togglePlayback);

      } catch (e) {
        console.error('loadRace failed:', e.message || e);
        const msg = e.message || 'onbekende fout';
        container.innerHTML = '<div class="error-state"><p>Kon race niet laden: <code>' + escHtml(msg) + '</code>. <a href="dashboard.html">Ga terug</a>.</p></div>';
      }
    }

    function renderBoatList(raceTracks) {
      // Filter by selected class
      const filtered = (raceTracks || []).filter(t => {
        if (!currentClass) return true;
        const name = t.series_class_name || t.class_name;
        return name === currentClass;
      });

      // Group by class
      const groups = {};
      const ungrouped = [];
      filtered.forEach((t, i) => {
        t._origIdx = (raceTracks || []).indexOf(t); // preserve raw index
        const clsName = t.series_class_name || t.class_name;
        if (clsName) {
          if (!groups[clsName]) groups[clsName] = [];
          groups[clsName].push(t);
        } else {
          ungrouped.push(t);
        }
      });

      let html = '';
      const groupNames = Object.keys(groups).sort();

      groupNames.forEach(gname => {
        html += `<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);padding:10px 0 4px">${escHtml(gname)}</div>`;
        groups[gname].forEach((t, j) => {
          const i = t._origIdx;
          const boatName = t.boat_name || 'Onbekende boot';
          const subInfo = [t.team_name, t.boat_type].filter(Boolean).join(' · ');
          html += `
            <div class="boat-item ${i === 0 ? 'active-boat' : ''}" data-idx="${i}">
              <div class="boat-color" style="background:${BOAT_COLORS[i % BOAT_COLORS.length]}"></div>
              <div class="boat-info">
                <div class="boat-name">${escHtml(boatName)}</div>
                <div class="boat-meta">${escHtml(subInfo || '')}</div>
              </div>
              <div class="boat-stats">
                <div class="boat-s"><div class="v">${t.avg_speed_knots != null ? t.avg_speed_knots.toFixed(1) : '—'} kn</div><div class="l">gem</div></div>
                <div class="boat-s"><div class="v">${t.max_speed_knots != null ? t.max_speed_knots.toFixed(1) : '—'} kn</div><div class="l">max</div></div>
              </div>
            </div>`;
        });
      });

      ungrouped.forEach((t, j) => {
        const i = t._origIdx;
        const boatName = t.boat_name || 'Onbekende boot';
        const subInfo = [t.team_name, t.boat_type].filter(Boolean).join(' · ');
        html += `
          <div class="boat-item ${i === 0 ? 'active-boat' : ''}" data-idx="${i}">
            <div class="boat-color" style="background:${BOAT_COLORS[i % BOAT_COLORS.length]}"></div>
            <div class="boat-info">
              <div class="boat-name">${escHtml(boatName)}</div>
              <div class="boat-meta">${escHtml(subInfo || '')}</div>
            </div>
            <div class="boat-stats">
              <div class="boat-s"><div class="v">${t.avg_speed_knots != null ? t.avg_speed_knots.toFixed(1) : '—'} kn</div><div class="l">gem</div></div>
              <div class="boat-s"><div class="v">${t.max_speed_knots != null ? t.max_speed_knots.toFixed(1) : '—'} kn</div><div class="l">max</div></div>
            </div>
          </div>`;
      });

      return html || '<div style="color:var(--muted);font-size:12px;padding:8px 0">Nog geen boten.</div>';
    }

    function buildRaceHTML(race, raceTracks, seriesRaces) {
      const date = fmtDate(race.created_at || race.date);
      const filteredCount = (raceTracks || []).filter(t => {
        if (!currentClass) return true;
        const name = t.series_class_name || t.class_name;
        return name === currentClass;
      }).length;
      const totalCount = (raceTracks || []).length;

      // Build series race switcher dropdown
      let seriesSwitcher = '';
      if (seriesRaces && seriesRaces.length > 1) {
        const options = seriesRaces.map(r =>
          `<option value="${r.id}" ${r.id === race.id ? 'selected' : ''}>${escHtml(r.name || 'Race #' + r.id)} ${r.race_date ? '· ' + fmtDate(r.race_date) : ''}</option>`
        ).join('');
        seriesSwitcher = `
          <div class="series-switcher">
            <select onchange="switchRace(this.value)" style="padding:5px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--fg);max-width:280px;cursor:pointer">
              ${options}
            </select>
          </div>`;
      }

      // Build class dropdown
      const classes = getAvailableClasses(raceTracks || []);
      let classSwitcher = '';
      if (classes.length > 1) {
        const classOpts = classes.map(c =>
          `<option value="${escHtml(c)}" ${c === currentClass ? 'selected' : ''}>${escHtml(c)}</option>`
        ).join('');
        classSwitcher = `
          <div class="series-switcher" style="margin-top:6px">
            <select id="class-select" onchange="onClassChange(this.value)" style="padding:5px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--fg);max-width:280px;cursor:pointer">
              ${classOpts}
            </select>
            <span style="font-size:11px;color:var(--muted);margin-left:6px">klasse</span>
          </div>`;
      }

      return `
        <div class="race-header">
          <div>
            <h2>${escHtml(race.name || race.label || 'Race #' + race.id)}</h2>
            <div class="race-meta">${date} · ${filteredCount}/${totalCount} boten</div>
            ${seriesSwitcher}
            ${classSwitcher}
          </div>
          <div class="race-actions">
            <button class="btn btn-secondary btn-sm" onclick="window.location.href='race-compare.html'">Vergelijk boten</button>
          </div>
        </div>

        <div class="playback-bar">
          <button class="play-btn" id="play-btn">▶</button>
          <span class="time-display" id="time-display">00:00</span>
          <div class="slider-container">
            <input type="range" id="playback-slider" min="0" max="1000" value="0" />
          </div>
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="2">2×</button>
          <button class="speed-btn" data-speed="5">5×</button>
          <button class="speed-btn" data-speed="10">10×</button>
        </div>

        <div class="map-section">
          <div class="map-container">
            <div id="map"></div>
          </div>
          <div class="map-sidebar">
            <div class="info-panel" id="info-panel">
              <h4>Actieve boot</h4>
              <div class="info-grid">
                <div class="info-cell"><div class="val" id="info-speed">—</div><div class="lbl">Snelheid</div></div>
                <div class="info-cell"><div class="val" id="info-heading">—</div><div class="lbl">Koers</div></div>
                <div class="info-cell"><div class="val" id="info-maxspeed">—</div><div class="lbl">Max</div></div>
                <div class="info-cell"><div class="val" id="info-avg">—</div><div class="lbl">Gem.</div></div>
                <div class="info-cell"><div class="val" id="info-dist">—</div><div class="lbl">Afstand (nm)</div></div>
                <div class="info-cell"><div class="val" id="info-duration">—</div><div class="lbl">Duur</div></div>
              </div>
            </div>
            <div class="info-panel">
              <h4>Boten in deze race</h4>
              <div class="boat-list" id="boat-list">
                ${renderBoatList(raceTracks || [])}
              </div>
            </div>
          </div>
        </div>

        <div class="chart-section" id="chart-section">
          <div class="chart-header">
            <h4>Snelheid (knopen) over tijd</h4>
            <span style="font-size:11px;color:var(--muted)">${totalCount > 1 ? 'Klik op een boot om te wisselen' : ''}</span>
          </div>
          <canvas id="speed-chart"></canvas>
        </div>
      `;
    }

    function initMap() {
      map = L.map('map', {
        zoomControl: true,
        attributionControl: false,
      }).setView([52.0, 4.5], 12);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18,
      }).addTo(map);
    }

    function parseTrackCoords(track) {
      if (track.points && Array.isArray(track.points)) {
        return track.points.map(p => [p.latitude || p.lat, p.longitude || p.lng || p.lon]);
      }
      if (track.coordinates && Array.isArray(track.coordinates)) {
        return track.coordinates.map(c => [c.lat || c[1], c.lng || c.lon || c[0]]);
      }
      return [];
    }

    async function fetchTrackPoints(track) {
      if (track._points) return track._points; // cached
      if (track._fetching) return track._fetching; // in-flight
      try {
        track._fetching = apiGet('/tracks/' + track.id + '/points');
        const data = await track._fetching;
        track._points = data.points || [];
        if (track._points.length >= 2) computeSmoothedHeadings(track._points, 5);
        track._maxSpeedKn = data.max_speed_kn || track.max_speed_knots || 0;
        delete track._fetching;
        return track._points;
      } catch (e) {
        console.error('fetchTrackPoints failed for track', track.id, e);
        delete track._fetching;
        return [];
      }
    }

    function getRealSpeedData(track) {
      const pts = track._points;
      if (!pts || !pts.length) return null;
      return pts.map(p => p.speed_kn != null ? p.speed_kn : 0);
    }

    function getRealMaxSpeed(track) {
      const data = getRealSpeedData(track);
      return data ? Math.max(...data, 0.1) : null;
    }

    function clearTrackLayers() {
      [ghostLine, trailLine, boatMarker].forEach(l => {
        if (l) { try { map.removeLayer(l); } catch (_) {} }
      });
      fadeSegments.forEach(l => { try { map.removeLayer(l); } catch (_) {} });
      ghostLine = null; trailLine = null; boatMarker = null; fadeSegments = [];
    }

    async function loadTrackOnMap(idx) {
      clearTrackLayers();
      if (!tracks.length || idx >= tracks.length) return;

      const track = tracks[idx];
      const points = await fetchTrackPoints(track);

      if (!points || points.length < 2) {
        const center = [52.0, 4.5];
        const demo = generateSailingTrack(center);
        const clr = BOAT_COLORS[idx % BOAT_COLORS.length];
        ghostLine = L.polyline(demo, { color: clr, weight: 2, opacity: 0.12 }).addTo(map);
        trailLine = L.polyline([], { color: clr, weight: 3.5, opacity: 0.8 }).addTo(map);
        map.fitBounds(L.latLngBounds(demo).pad(0.1));
        const boatLabel = track.boat_name || track.name || track.filename || ('Boot ' + (idx+1));
        const tooltipHtml = boatLabel + '<br><span style="font-size:10px">0.0 kn · 0°</span>';
        boatMarker = L.marker(demo[0], { icon: L.divIcon({
          className: 'boat-marker-icon',
          html: '<svg class="boat-icon-svg" viewBox="-10 -10 20 20" width="22" height="22" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3))"><path d="M-3,6 L3,6 L3,2 Q3,-1 2,-3 L0,-4 L-2,-3 Q-3,-1 -3,2 Z" fill="' + clr + '" stroke="#fff" stroke-width="1.2"/></svg>',
          iconSize: [22, 22], iconAnchor: [11, 11],
        })}).addTo(map).bindTooltip(tooltipHtml, {direction:'top', offset:[0,-12], permanent:true, className:'boat-tooltip'});
        track._demoCoords = demo;
        totalDuration = 120;
        return;
      }

      const coords = points.map(p => [p.lat, p.lon]);
      const clr = BOAT_COLORS[idx % BOAT_COLORS.length];
      const startTs = new Date(points[0].time).getTime();
      const endTs = new Date(points[points.length - 1].time).getTime();
      totalDuration = (endTs - startTs) / 1000;

      ghostLine = L.polyline(coords, { color: clr, weight: 2, opacity: 0.12 }).addTo(map);
      trailLine = L.polyline([], { color: clr, weight: 3.5, opacity: 0.8 }).addTo(map);
      map.fitBounds(L.latLngBounds(coords).pad(0.1));
      const boatLabel = track.boat_name || track.name || track.filename || ('Boot ' + (idx+1));
      const tooltipHtml = boatLabel + '<br><span style="font-size:10px">0.0 kn · 0°</span>';
      boatMarker = L.marker(coords[0], { icon: L.divIcon({
        className: 'boat-marker-icon',
        html: '<svg class="boat-icon-svg" viewBox="-10 -10 20 20" width="22" height="22" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3))"><path d="M-3,6 L3,6 L3,2 Q3,-1 2,-3 L0,-4 L-2,-3 Q-3,-1 -3,2 Z" fill="' + clr + '" stroke="#fff" stroke-width="1.2"/></svg>',
        iconSize: [22, 22], iconAnchor: [11, 11],
      })}).addTo(map).bindTooltip(tooltipHtml, {direction:'top', offset:[0,-12], permanent:true, className:'boat-tooltip'});
    }

    function generateSailingTrack(center) {
      const pts = 120;
      const coords = [];
      const lat0 = center[0];
      const lng0 = center[1];
      for (let i = 0; i < pts; i++) {
        const t = i / pts;
        const angle = t * Math.PI * 2.5 + 0.3;
        const radius = 0.015 + t * 0.025;
        const lat = lat0 + Math.sin(angle) * radius + (t * 0.008);
        const lng = lng0 + Math.cos(angle * 0.7) * radius * 0.6 + (t * 0.005);
        coords.push([lat, lng]);
      }
      return coords;
    }

    function generateSpeedData(track) {
      // Deterministic speed profile based on track metadata
      // Uses track.id as seed so the same track always produces the same curve
      const count = track.point_count || 120;
      const avgKnots = track.avg_speed_knots || 4;
      const maxKnots = track.max_speed_knots || 6;
      const range = maxKnots - avgKnots;
      const speeds = [];

      // Simple deterministic pseudo-random from track id
      let seed = (track.id || 1) * 2654435761;
      function pseudoRandom() {
        seed = (seed * 1103515245 + 12345) & 0x7fffffff;
        return seed / 0x7fffffff;
      }

      for (let i = 0; i < count; i++) {
        const base = avgKnots + Math.sin(i / 15) * range * 0.4;
        const gust = Math.sin(i / 3) > 0.8 ? range * 0.3 : 0;
        const noise = pseudoRandom() * range * 0.15;
        speeds.push(Math.round((base + gust + noise) * 10) / 10);
      }
      return speeds;
    }

    // Cache speed data per track — prefer real GPX data, fall back to generated
    function getSpeedData(track) {
      if (track._speedData) return track._speedData;

      // Try real speed data from fetched GPX points first
      const realSpeeds = getRealSpeedData(track);
      if (realSpeeds && realSpeeds.length > 0) {
        track._speedData = realSpeeds;
        track._speedMax = Math.max(...realSpeeds, 0.1);
        return track._speedData;
      }

      // Fallback: generated data
      track._speedData = generateSpeedData(track);
      track._speedMax = Math.max(...track._speedData, 2);
      return track._speedData;
    }

    function getSpeedMax(track) {
      if (!track._speedMax) {
        getSpeedData(track); // populates _speedMax
      }
      return track._speedMax;
    }

    function drawSpeedChart(idx) {
      const canvas = document.getElementById('speed-chart');
      if (!canvas || !tracks.length || idx >= tracks.length) return;
      const ctx = canvas.getContext('2d');

      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = rect.width - 40;
      const h = 200;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);

      const track = tracks[idx];
      const speedData = getSpeedData(track);    // cached, never changes for this track
      const maxSpeed = getSpeedMax(track);       // cached, never changes for this track
      const minSpeed = 0;
      const padding = { top: 12, bottom: 28, left: 40, right: 12 };
      const chartW = w - padding.left - padding.right;
      const chartH = h - padding.top - padding.bottom;

      function xPos(i) { return padding.left + (i / (speedData.length - 1)) * chartW; }
      function yPos(v) { return padding.top + chartH - ((v - minSpeed) / (maxSpeed - minSpeed)) * chartH; }

      ctx.clearRect(0, 0, w, h);

      // Light theme grid
      ctx.strokeStyle = 'rgba(71, 85, 105, 0.2)';
      ctx.lineWidth = 1;
      for (let k = 0; k <= 4; k++) {
        const y = padding.top + (k / 4) * chartH;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();
        ctx.fillStyle = 'rgba(71, 85, 105, 0.5)';
        ctx.font = '10px "JetBrains Mono", monospace';
        ctx.textAlign = 'right';
        ctx.fillText(((maxSpeed - minSpeed) * (1 - k / 4) + minSpeed).toFixed(1) + ' kn', padding.left - 6, y + 3);
      }

      // Area fill
      ctx.beginPath();
      ctx.moveTo(xPos(0), yPos(speedData[0]));
      for (let i = 1; i < speedData.length; i++) {
        ctx.lineTo(xPos(i), yPos(speedData[i]));
      }
      ctx.lineTo(xPos(speedData.length - 1), padding.top + chartH);
      ctx.lineTo(xPos(0), padding.top + chartH);
      ctx.closePath();
      ctx.fillStyle = 'rgba(29, 78, 216, 0.08)';
      ctx.fill();

      // Line
      ctx.beginPath();
      ctx.moveTo(xPos(0), yPos(speedData[0]));
      for (let i = 1; i < speedData.length; i++) {
        ctx.lineTo(xPos(i), yPos(speedData[i]));
      }
      ctx.strokeStyle = BOAT_COLORS[activeTrackIdx % BOAT_COLORS.length];
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Active position dot
      const dotIdx = Math.min(Math.round((currentTime / totalDuration) * (speedData.length - 1)), speedData.length - 1);
      ctx.beginPath();
      ctx.arc(xPos(dotIdx), yPos(speedData[dotIdx]), 5, 0, Math.PI * 2);
      ctx.fillStyle = BOAT_COLORS[activeTrackIdx % BOAT_COLORS.length];
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Time axis
      ctx.fillStyle = 'rgba(71, 85, 105, 0.5)';
      ctx.font = '10px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      for (let i = 0; i < speedData.length; i += 20) {
        const mins = Math.floor(i * 5 / 60);
        const secs = (i * 5) % 60;
        ctx.fillText(String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0'), xPos(i), h - 6);
      }
    }

    function updateInfoPanel(idx) {
      const track = tracks[idx];
      if (!track) return;

      const speedData = getSpeedData(track);
      const maxK = getSpeedMax(track);
      const avgK = speedData.length > 0
        ? speedData.reduce((a, b) => a + b, 0) / speedData.length
        : 0;
      const distNm = track.distance_meters != null
        ? (track.distance_meters / 1852).toFixed(1)
        : '—';
      const durationSec = track.duration_seconds != null
        ? track.duration_seconds
        : (speedData.length * 5);

      document.getElementById('info-speed').textContent =
        (speedData.length > 0 ? speedData[0].toFixed(1) : '—') + ' kn';
      document.getElementById('info-heading').textContent =
        track.wind_direction_deg != null ? track.wind_direction_deg + '°' : '—';
      document.getElementById('info-maxspeed').textContent = maxK.toFixed(1) + ' kn';
      document.getElementById('info-avg').textContent = avgK.toFixed(1) + ' kn';
      document.getElementById('info-dist').textContent = distNm + ' nm';
      document.getElementById('info-duration').textContent = fmtDuration(durationSec);
    }

    async function selectBoat(idx) {
      if (idx === activeTrackIdx) return;
      activeTrackIdx = idx;

      document.querySelectorAll('.boat-item').forEach((el, i) => {
        el.classList.toggle('active-boat', i === idx);
        // Reset boat stats to static avg/max
        if (i < tracks.length) {
          const t = tracks[i];
          const statsEl = el.querySelector('.boat-stats');
          if (statsEl) {
            statsEl.innerHTML = `
              <div class="boat-s"><div class="v">${t.avg_speed_knots != null ? t.avg_speed_knots.toFixed(1) : '—'} kn</div><div class="l">gem</div></div>
              <div class="boat-s"><div class="v">${t.max_speed_knots != null ? t.max_speed_knots.toFixed(1) : '—'} kn</div><div class="l">max</div></div>`;
          }
        }
      });

      await loadTrackOnMap(idx);
      drawSpeedChart(idx);
      updateInfoPanel(idx);
      playing = false; if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      currentTime = 0;
      const slider = document.getElementById('playback-slider');
      if (slider) slider.value = 0;
      document.getElementById('time-display').textContent = '00:00';
    }

    function computeSmoothedHeadings(points, windowSize) {
      // Bereken heading voor elk punt als bearing over windowSize punten vooruit/achteruit.
      // Stopt bij GPS-gaten (>5 sec) om te voorkomen dat de koers over een gat heen
      // een verkeerde richting krijgt.
      const n = points.length;
      const MAX_GAP = 5; // seconden
      for (let i = 0; i < n; i++) {
        let lo = i, hi = i;
        // Stap naar links tot windowSize of tot een gat
        for (let s = 0; s < windowSize && lo > 0; s++) {
          const gap = points[lo].time && points[lo-1].time
            ? (new Date(points[lo].time) - new Date(points[lo-1].time)) / 1000 : 0;
          if (gap > MAX_GAP) break;
          lo--;
        }
        // Stap naar rechts tot windowSize of tot een gat
        for (let s = 0; s < windowSize && hi < n-1; s++) {
          const gap = points[hi+1].time && points[hi].time
            ? (new Date(points[hi+1].time) - new Date(points[hi].time)) / 1000 : 0;
          if (gap > MAX_GAP) break;
          hi++;
        }
        const dLon = points[hi].lon - points[lo].lon;
        const dLat = points[hi].lat - points[lo].lat;
        points[i]._hdg = (Math.atan2(dLon, dLat) * 180 / Math.PI + 360) % 360;
      }
    }

    function interpolatePosition(idx) {
      const track = tracks[idx];
      if (!track) return null;
      const pts = track._points;
      if (!pts || pts.length < 2) return null;
      const startTs = new Date(pts[0].time).getTime();
      const targetTs = startTs + currentTime * 1000;
      if (currentTime <= 0) return { lat: pts[0].lat, lng: pts[0].lon, heading: pts[0]._hdg || null, spd: pts[0].speed_kn || 0 };
      if (currentTime >= totalDuration) { const l = pts[pts.length-1]; return { lat: l.lat, lng: l.lon, heading: l._hdg || null, spd: l.speed_kn || 0 }; }
      for (let i = 0; i < pts.length-1; i++) {
        const t0 = new Date(pts[i].time).getTime(), t1 = new Date(pts[i+1].time).getTime();
        if (targetTs >= t0 && targetTs <= t1) {
          const f = (t1-t0>0) ? (targetTs-t0)/(t1-t0) : 0;
          return { lat: pts[i].lat + (pts[i+1].lat-pts[i].lat)*f, lng: pts[i].lon + (pts[i+1].lon-pts[i].lon)*f,
            heading: pts[i]._hdg != null ? pts[i]._hdg : null,
            spd: (pts[i].speed_kn||0) + ((pts[i+1].speed_kn||0) - (pts[i].speed_kn||0))*f };
        }
      }
      return null;
    }

    function updateBoatMarker() {
      if (!boatMarker || !map) return;
      const pos = interpolatePosition(activeTrackIdx);
      if (!pos) return;
      boatMarker.setLatLng([pos.lat, pos.lng]);
      if (pos.heading != null) {
        const el = boatMarker.getElement();
        if (el) { const a = el.querySelector('.boat-icon-svg'); if (a) a.style.transform = 'rotate(' + pos.heading.toFixed(1) + 'deg)'; }
      }
      // Update tooltip with live speed + heading
      const track = tracks[activeTrackIdx];
      const boatLabel = track?.boat_name || track?.name || track?.filename || ('Boot ' + (activeTrackIdx+1));
      const hdg = pos.heading != null ? Math.round(pos.heading) : 0;
      boatMarker.setTooltipContent(boatLabel + '<br><span style="font-size:10px">' + pos.spd.toFixed(1) + ' kn · ' + hdg + '°</span>');
      // Update boat list
      document.querySelectorAll('.boat-item').forEach(el => {
        if (parseInt(el.dataset.idx) === activeTrackIdx) {
          const s = el.querySelector('.boat-stats');
          if (s) s.innerHTML = '<div class="boat-s"><div class="v">' + pos.spd.toFixed(1) + ' kn</div><div class="l">nu</div></div><div class="boat-s"><div class="v">' + (pos.heading!=null?Math.round(pos.heading):0) + '°</div><div class="l">koers</div></div>';
        }
      });
      // Update info panel
      const elSpd = document.getElementById('info-speed');
      const elHdg = document.getElementById('info-heading');
      if (elSpd) elSpd.textContent = pos.spd.toFixed(1) + ' kn';
      if (elHdg) elHdg.textContent = (pos.heading != null ? Math.round(pos.heading) : 0) + '°';
    }

    function updateTrails() {
      if (!map || !trailLine) return;
      const pts = tracks[activeTrackIdx]?._points; if (!pts || pts.length < 2) return;
      const startTs = new Date(pts[0].time).getTime();
      const clr = BOAT_COLORS[activeTrackIdx % BOAT_COLORS.length];
      const TAIL=18; const traveled=[], tail=[];
      for (const p of pts) { const t = (new Date(p.time).getTime()-startTs)/1000; if (t<=currentTime) { traveled.push([p.lat,p.lon]); if (t>currentTime-TAIL) tail.push({lat:p.lat,lon:p.lon,t}); } else break; }
      trailLine.setLatLngs(traveled.length>=2?traveled:[]); trailLine.setStyle({color:clr,opacity:0.8});
      fadeSegments.forEach(l=>{try{map.removeLayer(l)}catch(_){}}); fadeSegments=[];
      const B=4, sz=Math.max(1,Math.ceil((tail.length-1)/B));
      for(let s=0;s<B;s++){const a=s*sz,b=Math.min((s+1)*sz,tail.length-1);if(b<=a)continue;
        fadeSegments.push(L.polyline(tail.slice(a,b+1).map(p=>[p.lat,p.lon]),{color:clr,weight:3.5,opacity:0.05+((s+1)/B)*0.55}).addTo(map));}
    }

    function updateTimelineUI() {
      const sl = document.getElementById('playback-slider'), dp = document.getElementById('time-display');
      if (sl) sl.value = totalDuration>0 ? Math.round((currentTime/totalDuration)*1000) : 0;
      if (dp) dp.textContent = fmtDuration(currentTime);
    }

    function startPlayback() {
      if (currentTime >= totalDuration) { currentTime=0; updateBoatMarker(); updateTrails(); }
      playing=true; lastFrameTs=performance.now(); document.getElementById('play-btn').textContent='⏸'; animLoop(lastFrameTs);
    }
    function stopPlayback() { playing=false; if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;} document.getElementById('play-btn').textContent='▶'; }
    function animLoop(now) {
      if(!playing)return; const dt=(now-lastFrameTs)/1000; lastFrameTs=now; currentTime+=dt*playSpeed;
      if(currentTime>=totalDuration){currentTime=totalDuration;stopPlayback();}
      updateBoatMarker(); updateTrails(); updateTimelineUI(); drawSpeedChart(activeTrackIdx);
      animFrameId=requestAnimationFrame(animLoop);
    }
    function togglePlayback() { if(playing) stopPlayback(); else startPlayback(); }

    // ── Load individual track ────────────────────────────────────────────
    async function loadSingleTrack(tid, container) {
      console.log('loadSingleTrack called with tid:', tid);
      try {
        console.log('Fetching track:', tid);
        const track = await apiGet('/tracks/' + tid);
        console.log('Track response:', track);
        if (!track || track.error) throw new Error(track?.error || 'Niet gevonden');

        document.getElementById('breadcrumb-race').textContent = track.name || 'Track #' + tid;

        // Fetch GPX coordinates
        let coords = [];
        try {
          const gpxRes = await fetch(API + '/tracks/' + tid + '/gpx', {
            headers: { 'Authorization': 'Bearer ' + getToken() },
          });
          if (gpxRes.ok) {
            const xml = await gpxRes.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, 'text/xml');
            const pts = doc.querySelectorAll('trkpt');
            pts.forEach(pt => {
              const lat = parseFloat(pt.getAttribute('lat'));
              const lon = parseFloat(pt.getAttribute('lon'));
              if (!isNaN(lat) && !isNaN(lon)) coords.push([lat, lon]);
            });
          }
        } catch (_) {}

        // Use demo track if no coords
        const displayCoords = coords.length >= 2 ? coords : generateSailingTrack([52.0, 4.5]);

        const kn = n => n != null ? n.toFixed(1) + ' kn' : '—';
        const dur = track.duration_seconds ? fmtDuration(track.duration_seconds) : '—';
        const dist = track.distance_meters != null ? (track.distance_meters >= 1000 ? (track.distance_meters/1000).toFixed(1) + ' km' : Math.round(track.distance_meters) + ' m') : '—';

        container.innerHTML = `
          <div class="breadcrumb">
            <a href="dashboard.html">Dashboard</a>
            <span>·</span>
            <span>${escHtml(track.name || 'Track #' + tid)}</span>
          </div>

          <div class="race-header">
            <div>
              <h2>${escHtml(track.name || 'Track #' + tid)}</h2>
              <div class="race-meta">${fmtDate(track.recorded_at)} · ${track.point_count || coords.length} punten</div>
            </div>
          </div>

          <div class="map-section">
            <div class="map-container">
              <div id="map"></div>
            </div>
            <div class="map-sidebar">
              <div class="info-panel">
                <h4>Track details</h4>
                <div class="info-grid">
                  <div class="info-cell"><div class="val">${kn(track.max_speed_knots)}</div><div class="lbl">Max snelheid</div></div>
                  <div class="info-cell"><div class="val">${kn(track.avg_speed_knots)}</div><div class="lbl">Gemiddeld</div></div>
                  <div class="info-cell"><div class="val">${dist}</div><div class="lbl">Afstand</div></div>
                  <div class="info-cell"><div class="val">${dur}</div><div class="lbl">Duur</div></div>
                </div>
              </div>
            </div>
          </div>
        `;

        // We coords but need to wrap as pseudo-track for the map functions
        tracks = [Object.assign({}, track, { _coords: displayCoords })];
        initMap();
        ghostLine = L.polyline(displayCoords, {
          color: BOAT_COLORS[0],
          weight: 2,
          opacity: 0.12,
        }).addTo(map);
        // ghost already set
        map.fitBounds(ghostLine.getBounds().pad(0.1));

        if (displayCoords.length > 0) {
          const end = displayCoords[displayCoords.length - 1];
          const marker = L.circleMarker(end, {
            radius: 6,
            color: BOAT_COLORS[0],
            fillColor: '#fff',
            fillOpacity: 1,
            weight: 2,
          }).addTo(map);
          marker.bindTooltip('Finish', { direction: 'top' });
        }

      } catch (e) {
        console.error('loadSingleTrack error:', e);
        container.innerHTML = '<div class="error-state"><p>Kon track niet laden. <a href="dashboard.html">Ga terug</a>.</p></div>';
      }
    }

    loadRace();

    window.addEventListener('resize', () => {
      if (tracks.length) drawSpeedChart(activeTrackIdx);
    });
  </script>
</body>
</html>
