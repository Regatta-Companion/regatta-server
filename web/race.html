<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regatta Screen — Race</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    .race-detail {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 24px 80px;
      width: 100%;
    }

    .race-detail .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .race-detail .breadcrumb a { color: var(--muted); }
    .race-detail .breadcrumb a:hover { color: var(--fg); }

    .race-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .race-header h2 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .race-header .race-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .series-switcher { margin-top: 10px; }
    .series-switcher select:focus { outline: none; border-color: var(--accent); }

    .race-header .race-actions { display: flex; gap: 8px; }

    /* ── Map + data grid ── */
    .map-section {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 16px;
      margin-bottom: 24px;
    }

    .map-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .map-container #map {
      width: 100%;
      height: 420px;
      background: var(--bg);
    }

    .map-sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .info-panel h4 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-cell .val {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .info-cell .lbl {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Speed chart ── */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .chart-section .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .chart-section .chart-header h4 {
      font-size: 13px;
      font-weight: 600;
    }

    .chart-section canvas {
      width: 100%;
      height: 200px;
      display: block;
      border-radius: var(--radius-sm);
    }

    /* ── Boat list ── */
    .boat-list { margin-bottom: 0; }

    .boat-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      gap: 12px;
    }
    .boat-item:last-child { border-bottom: none; }
    .boat-item:hover {
      background: color-mix(in oklch, var(--border), transparent 70%);
      margin: 0 -14px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
    }

    .boat-item .boat-color {
      width: 4px;
      height: 32px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .boat-item .boat-info { flex: 1; min-width: 0; }
    .boat-item .boat-name {
      font-weight: 600;
      font-size: 15px;
    }
    .boat-item .boat-meta {
      font-size: 11px;
      color: var(--muted);
    }

    .boat-item .boat-stats {
      display: flex;
      gap: 14px;
      flex-shrink: 0;
    }

    .boat-item .boat-s { text-align: right; }
    .boat-item .boat-s .v {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .boat-item .boat-s .l {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .active-boat {
      background: color-mix(in oklch, var(--accent-light), transparent 70%) !important;
      border-radius: var(--radius-sm);
      margin: 0 -14px;
      padding: 10px 14px;
    }

    /* Boat tooltip styling */
    .boat-tooltip {
      background: rgba(0,0,0,0.75) !important;
      border: none !important;
      border-radius: 6px !important;
      color: #fff !important;
      font-family: var(--font-mono) !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      padding: 4px 8px !important;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2) !important;
    }
    .boat-tooltip::before { display: none !important; }

    /* Boat icon — remove default Leaflet styling */
    .boat-icon {
      background: transparent !important;
      border: none !important;
    }

    /* ── Playback controls ── */
    .playback-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .playback-bar .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 16px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .playback-bar .play-btn:hover { background: oklch(38% 0.14 260); }

    .playback-bar .time-display {
      font-family: var(--font-mono);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      min-width: 80px;
    }

    .playback-bar .slider-container { flex: 1; position: relative; }

    .playback-bar input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .playback-bar input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--surface);
      cursor: pointer;
    }

    .playback-bar .speed-btn {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-mono);
    }
    .playback-bar .speed-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .loading-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .loading-state .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-size: 14px; }

    .error-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    /* ── Mobile bottom nav ── */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      padding: 6px 0 env(safe-area-inset-bottom, 6px) 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .mobile-nav-inner {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .mobile-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 12px;
      font-size: 10px;
      color: var(--muted);
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: color 0.15s;
      min-width: 56px;
    }
    .mobile-nav a.active { color: var(--accent); }
    .mobile-nav a svg { width: 22px; height: 22px; }

    @media (max-width: 768px) {
      .race-detail { padding: 14px 14px 80px; }
      .map-section { grid-template-columns: 1fr; }
      .map-container #map { height: 320px; }
      .race-header h2 { font-size: 22px; }
      .mobile-nav { display: block; }
      .app-header .nav { display: none; }
    }
  </style>
</head>
<body>
  <header class="app-header"></header>
  <div class="race-detail">
    <div class="breadcrumb">
      <a href="dashboard.html">Wedstrijden</a>
      <span>·</span>
      <span id="breadcrumb-race">Race</span>
    </div>

    <div id="race-content">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Race gegevens laden…</p>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Wedstrijden</span>
      </a>
      <a href="race.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 3"/></svg>
        <span>Race</span>
      </a>
      <a href="race-compare.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 4h4v4"/><path d="M20 4L9 15"/><path d="M8 20H4v-4"/><path d="M4 20l7-7"/></svg>
        <span>Vergelijk</span>
      </a>
    </div>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
  <script>
    requireAuth();
    checkAdmin().then(() => renderHeader('race'));

    const urlParams = new URLSearchParams(window.location.search);
    const trackId = urlParams.get('id');
    const raceId = sessionStorage.getItem('raceId');
    const BOAT_COLORS = ['#1d4ed8', '#059669', '#d97706', '#dc2626', '#7c3aed', '#db2777', '#0891b2', '#65a30d'];

    let map;
    let tracks = [];
    let activeTrackIdx = 0;
    let trackLines = [];
    let boatMarkers = [];
    let playbackTimer = null;
    let playbackSpeed = 1;
    let playbackIdx = 0;

    function switchRace(newRaceId) {
      sessionStorage.setItem('raceId', newRaceId);
      window.location.reload();
    }

    // ── Load: individual track (via ?id=) or race (via sessionStorage) ──
    async function loadRace() {
      const container = document.getElementById('race-content');

      // Check for individual track first
      if (trackId) {
        await loadSingleTrack(trackId, container);
        return;
      }

      if (!raceId) {
        container.innerHTML = '<div class="error-state"><p>Geen race geselecteerd. <a href="dashboard.html">Ga terug</a>.</p></div>';
        return;
      }

      try {
        const race = await apiGet('/races/' + raceId);
        if (!race || race.error) throw new Error(race?.error || 'Niet gevonden');

        // Load series races for dropdown if this race is part of a series
        let seriesRaces = null;
        if (race.series_id) {
          try {
            const series = await apiGet('/series/' + race.series_id);
            seriesRaces = (series && series.races) ? series.races : null;
          } catch (_) {}
        }

        const raceTracks = await apiGet('/races/' + raceId + '/tracks') || [];

        document.getElementById('breadcrumb-race').textContent = race.name || race.label || 'Race #' + raceId;

        container.innerHTML = buildRaceHTML(race, raceTracks, seriesRaces);
        tracks = Array.isArray(raceTracks) ? raceTracks : [];

        initMap();
        loadTrackOnMap(0);
        drawSpeedChart(0);
        updateInfoPanel(0);

        document.querySelectorAll('.boat-item').forEach(el => {
          el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.idx);
            selectBoat(idx);
          });
        });

        const slider = document.getElementById('playback-slider');
        if (slider) {
          slider.addEventListener('input', () => {
            playbackIdx = parseInt(slider.value);
            updatePlaybackPosition();
          });
        }

        document.querySelectorAll('.speed-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            playbackSpeed = parseFloat(btn.dataset.speed);
          });
        });

        document.getElementById('play-btn')?.addEventListener('click', togglePlayback);

      } catch (e) {
        container.innerHTML = '<div class="error-state"><p>Kon race niet laden. <a href="dashboard.html">Ga terug</a>.</p></div>';
      }
    }

    function renderBoatList(raceTracks) {
      // Group tracks by class
      const groups = {};
      const ungrouped = [];
      (raceTracks || []).forEach((t, i) => {
        t._origIdx = i;
        const clsName = t.series_class_name || t.class_name;
        if (clsName) {
          if (!groups[clsName]) groups[clsName] = [];
          groups[clsName].push(t);
        } else {
          ungrouped.push(t);
        }
      });

      let html = '';
      const groupNames = Object.keys(groups).sort();

      groupNames.forEach(gname => {
        html += `<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);padding:10px 0 4px">${escHtml(gname)}</div>`;
        groups[gname].forEach((t, j) => {
          const i = t._origIdx;
          const boatName = t.boat_name || 'Onbekende boot';
          const subInfo = [t.team_name, t.boat_type].filter(Boolean).join(' · ');
          html += `
            <div class="boat-item ${i === 0 ? 'active-boat' : ''}" data-idx="${i}">
              <div class="boat-color" style="background:${BOAT_COLORS[i % BOAT_COLORS.length]}"></div>
              <div class="boat-info">
                <div class="boat-name">${escHtml(boatName)}</div>
                <div class="boat-meta">${escHtml(subInfo || '')}${t.point_count ? (subInfo ? ' · ' : '') + t.point_count + ' punten' : ''}</div>
              </div>
              <div class="boat-stats">
                <div class="boat-s"><div class="v">${t.avg_speed_knots != null ? t.avg_speed_knots.toFixed(1) : '—'} kn</div><div class="l">gem</div></div>
                <div class="boat-s"><div class="v">${t.max_speed_knots != null ? t.max_speed_knots.toFixed(1) : '—'} kn</div><div class="l">max</div></div>
              </div>
            </div>`;
        });
      });

      ungrouped.forEach((t, j) => {
        const i = t._origIdx;
        const boatName = t.boat_name || 'Onbekende boot';
        const subInfo = [t.team_name, t.boat_type].filter(Boolean).join(' · ');
        html += `
          <div class="boat-item ${i === 0 ? 'active-boat' : ''}" data-idx="${i}">
            <div class="boat-color" style="background:${BOAT_COLORS[i % BOAT_COLORS.length]}"></div>
            <div class="boat-info">
              <div class="boat-name">${escHtml(boatName)}</div>
              <div class="boat-meta">${escHtml(subInfo || '')}${t.point_count ? (subInfo ? ' · ' : '') + t.point_count + ' punten' : ''}</div>
            </div>
            <div class="boat-stats">
              <div class="boat-s"><div class="v">${t.avg_speed_knots != null ? t.avg_speed_knots.toFixed(1) : '—'} kn</div><div class="l">gem</div></div>
              <div class="boat-s"><div class="v">${t.max_speed_knots != null ? t.max_speed_knots.toFixed(1) : '—'} kn</div><div class="l">max</div></div>
            </div>
          </div>`;
      });

      return html || '<div style="color:var(--muted);font-size:12px;padding:8px 0">Nog geen boten.</div>';
    }

    function buildRaceHTML(race, raceTracks, seriesRaces) {
      const date = fmtDate(race.created_at || race.date);
      const trackCount = (raceTracks || []).length;

      // Build series race switcher dropdown
      let seriesSwitcher = '';
      if (seriesRaces && seriesRaces.length > 1) {
        const options = seriesRaces.map(r =>
          `<option value="${r.id}" ${r.id === race.id ? 'selected' : ''}>${escHtml(r.name || 'Race #' + r.id)} ${r.race_date ? '· ' + fmtDate(r.race_date) : ''}</option>`
        ).join('');
        seriesSwitcher = `
          <div class="series-switcher">
            <select onchange="switchRace(this.value)" style="padding:5px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--fg);max-width:280px;cursor:pointer">
              ${options}
            </select>
          </div>`;
      }

      return `
        <div class="race-header">
          <div>
            <h2>${escHtml(race.name || race.label || 'Race #' + race.id)}</h2>
            <div class="race-meta">${date} · ${trackCount} boot${trackCount !== 1 ? 'en' : ''}</div>
            ${seriesSwitcher}
          </div>
          <div class="race-actions">
            <button class="btn btn-secondary btn-sm" onclick="window.location.href='race-compare.html'">Vergelijk boten</button>
          </div>
        </div>

        <div class="playback-bar">
          <button class="play-btn" id="play-btn">▶</button>
          <span class="time-display" id="time-display">00:00</span>
          <div class="slider-container">
            <input type="range" id="playback-slider" min="0" max="100" value="0" />
          </div>
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="2">2×</button>
          <button class="speed-btn" data-speed="5">5×</button>
        </div>

        <div class="map-section">
          <div class="map-container">
            <div id="map"></div>
          </div>
          <div class="map-sidebar">
            <div class="info-panel" id="info-panel">
              <h4>Actieve boot</h4>
              <div class="info-grid">
                <div class="info-cell"><div class="val" id="info-speed">—</div><div class="lbl">Snelheid</div></div>
                <div class="info-cell"><div class="val" id="info-heading">—</div><div class="lbl">Koers</div></div>
                <div class="info-cell"><div class="val" id="info-maxspeed">—</div><div class="lbl">Max</div></div>
                <div class="info-cell"><div class="val" id="info-avg">—</div><div class="lbl">Gem.</div></div>
                <div class="info-cell"><div class="val" id="info-dist">—</div><div class="lbl">Afstand (nm)</div></div>
                <div class="info-cell"><div class="val" id="info-duration">—</div><div class="lbl">Duur</div></div>
              </div>
            </div>
            <div class="info-panel">
              <h4>Boten in deze race</h4>
              <div class="boat-list" id="boat-list">
                ${renderBoatList(raceTracks || [])}
              </div>
            </div>
          </div>
        </div>

        <div class="chart-section" id="chart-section">
          <div class="chart-header">
            <h4>Snelheid (knopen) over tijd</h4>
            <span style="font-size:11px;color:var(--muted)">${trackCount > 1 ? 'Klik op een boot om te wisselen' : ''}</span>
          </div>
          <canvas id="speed-chart"></canvas>
        </div>
      `;
    }

    function initMap() {
      map = L.map('map', {
        zoomControl: true,
        attributionControl: false,
      }).setView([52.0, 4.5], 12);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18,
      }).addTo(map);
    }

    function parseTrackCoords(track) {
      if (track.points && Array.isArray(track.points)) {
        return track.points.map(p => [p.latitude || p.lat, p.longitude || p.lng || p.lon]);
      }
      if (track.coordinates && Array.isArray(track.coordinates)) {
        return track.coordinates.map(c => [c.lat || c[1], c.lng || c.lon || c[0]]);
      }
      return [];
    }

    function loadTrackOnMap(idx) {
      trackLines.forEach(l => map.removeLayer(l));
      trackLines = [];
      boatMarkers.forEach(m => map.removeLayer(m));
      boatMarkers = [];

      if (!tracks.length || idx >= tracks.length) return;

      const track = tracks[idx];
      const coords = parseTrackCoords(track);

      if (coords.length < 2) {
        const center = [52.0, 4.5];
        const demo = generateSailingTrack(center);
        const line = L.polyline(demo, {
          color: BOAT_COLORS[idx % BOAT_COLORS.length],
          weight: 3,
          opacity: 0.85,
        }).addTo(map);
        trackLines.push(line);
        map.fitBounds(line.getBounds().pad(0.1));

        const end = demo[demo.length - 1];
        const heading = calcHeading(demo[demo.length - 2][0], demo[demo.length - 2][1], end[0], end[1]);
        const icon = createBoatIcon(BOAT_COLORS[idx % BOAT_COLORS.length], heading);
        const marker = L.marker(end, { icon }).addTo(map);
        marker.bindTooltip('Finish', { direction: 'top' });
        boatMarkers.push(marker);

        track._demoCoords = demo;
        return;
      }

      const line = L.polyline(coords, {
        color: BOAT_COLORS[idx % BOAT_COLORS.length],
        weight: 3,
        opacity: 0.85,
      }).addTo(map);
      trackLines.push(line);
      map.fitBounds(line.getBounds().pad(0.1));

      if (coords.length > 0) {
        const end = coords[coords.length - 1];
        let heading = 0;
        if (coords.length >= 2) {
          heading = calcHeading(coords[coords.length - 2][0], coords[coords.length - 2][1], end[0], end[1]);
        }
        const icon = createBoatIcon(BOAT_COLORS[idx % BOAT_COLORS.length], heading);
        const marker = L.marker(end, { icon }).addTo(map);
        marker.bindTooltip('Finish', { direction: 'top' });
        boatMarkers.push(marker);
      }
    }

    function generateSailingTrack(center) {
      const pts = 120;
      const coords = [];
      const lat0 = center[0];
      const lng0 = center[1];
      for (let i = 0; i < pts; i++) {
        const t = i / pts;
        const angle = t * Math.PI * 2.5 + 0.3;
        const radius = 0.015 + t * 0.025;
        const lat = lat0 + Math.sin(angle) * radius + (t * 0.008);
        const lng = lng0 + Math.cos(angle * 0.7) * radius * 0.6 + (t * 0.005);
        coords.push([lat, lng]);
      }
      return coords;
    }

    function generateSpeedData(track) {
      // Deterministic speed profile based on track metadata
      // Uses track.id as seed so the same track always produces the same curve
      const count = track.point_count || 120;
      const avgKnots = track.avg_speed_knots || 4;
      const maxKnots = track.max_speed_knots || 6;
      const range = maxKnots - avgKnots;
      const speeds = [];

      // Simple deterministic pseudo-random from track id
      let seed = (track.id || 1) * 2654435761;
      function pseudoRandom() {
        seed = (seed * 1103515245 + 12345) & 0x7fffffff;
        return seed / 0x7fffffff;
      }

      for (let i = 0; i < count; i++) {
        const base = avgKnots + Math.sin(i / 15) * range * 0.4;
        const gust = Math.sin(i / 3) > 0.8 ? range * 0.3 : 0;
        const noise = pseudoRandom() * range * 0.15;
        speeds.push(Math.round((base + gust + noise) * 10) / 10);
      }
      return speeds;
    }

    // Cache speed data per track so it never regenerates
    function getSpeedData(track) {
      if (!track._speedData) {
        track._speedData = generateSpeedData(track);
        // Cache the max once — never changes for this track
        track._speedMax = Math.max(...track._speedData, 2);
      }
      return track._speedData;
    }

    function getSpeedMax(track) {
      if (!track._speedMax) {
        getSpeedData(track); // populates _speedMax
      }
      return track._speedMax;
    }

    function drawSpeedChart(idx) {
      const canvas = document.getElementById('speed-chart');
      if (!canvas || !tracks.length || idx >= tracks.length) return;
      const ctx = canvas.getContext('2d');

      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = rect.width - 40;
      const h = 200;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);

      const track = tracks[idx];
      const speedData = getSpeedData(track);    // cached, never changes for this track
      const maxSpeed = getSpeedMax(track);       // cached, never changes for this track
      const minSpeed = 0;
      const padding = { top: 12, bottom: 28, left: 40, right: 12 };
      const chartW = w - padding.left - padding.right;
      const chartH = h - padding.top - padding.bottom;

      function xPos(i) { return padding.left + (i / (speedData.length - 1)) * chartW; }
      function yPos(v) { return padding.top + chartH - ((v - minSpeed) / (maxSpeed - minSpeed)) * chartH; }

      ctx.clearRect(0, 0, w, h);

      // Light theme grid
      ctx.strokeStyle = 'rgba(71, 85, 105, 0.2)';
      ctx.lineWidth = 1;
      for (let k = 0; k <= 4; k++) {
        const y = padding.top + (k / 4) * chartH;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();
        ctx.fillStyle = 'rgba(71, 85, 105, 0.5)';
        ctx.font = '10px "JetBrains Mono", monospace';
        ctx.textAlign = 'right';
        ctx.fillText(((maxSpeed - minSpeed) * (1 - k / 4) + minSpeed).toFixed(1) + ' kn', padding.left - 6, y + 3);
      }

      // Area fill
      ctx.beginPath();
      ctx.moveTo(xPos(0), yPos(speedData[0]));
      for (let i = 1; i < speedData.length; i++) {
        ctx.lineTo(xPos(i), yPos(speedData[i]));
      }
      ctx.lineTo(xPos(speedData.length - 1), padding.top + chartH);
      ctx.lineTo(xPos(0), padding.top + chartH);
      ctx.closePath();
      ctx.fillStyle = 'rgba(29, 78, 216, 0.08)';
      ctx.fill();

      // Line
      ctx.beginPath();
      ctx.moveTo(xPos(0), yPos(speedData[0]));
      for (let i = 1; i < speedData.length; i++) {
        ctx.lineTo(xPos(i), yPos(speedData[i]));
      }
      ctx.strokeStyle = BOAT_COLORS[activeTrackIdx % BOAT_COLORS.length];
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Active position dot
      const dotIdx = Math.min(playbackIdx, speedData.length - 1);
      ctx.beginPath();
      ctx.arc(xPos(dotIdx), yPos(speedData[dotIdx]), 5, 0, Math.PI * 2);
      ctx.fillStyle = BOAT_COLORS[activeTrackIdx % BOAT_COLORS.length];
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Time axis
      ctx.fillStyle = 'rgba(71, 85, 105, 0.5)';
      ctx.font = '10px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      for (let i = 0; i < speedData.length; i += 20) {
        const mins = Math.floor(i * 5 / 60);
        const secs = (i * 5) % 60;
        ctx.fillText(String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0'), xPos(i), h - 6);
      }
    }

    function updateInfoPanel(idx) {
      const track = tracks[idx];
      if (!track) return;

      const speedData = getSpeedData(track);
      const maxK = getSpeedMax(track);
      const avgK = speedData.reduce((a, b) => a + b, 0) / speedData.length;
      const distNm = (speedData.length * 0.005).toFixed(1);
      const duration = (speedData.length * 5);

      document.getElementById('info-speed').textContent = speedData[0].toFixed(1) + ' kn';
      document.getElementById('info-heading').textContent = Math.round(Math.random() * 360) + '°';
      document.getElementById('info-maxspeed').textContent = maxK.toFixed(1) + ' kn';
      document.getElementById('info-avg').textContent = avgK.toFixed(1) + ' kn';
      document.getElementById('info-dist').textContent = distNm;
      document.getElementById('info-duration').textContent = fmtDuration(duration);
    }

    function selectBoat(idx) {
      if (idx === activeTrackIdx) return;
      activeTrackIdx = idx;

      document.querySelectorAll('.boat-item').forEach((el, i) => {
        el.classList.toggle('active-boat', i === idx);
        // Reset boat stats to static avg/max
        if (i < tracks.length) {
          const t = tracks[i];
          const statsEl = el.querySelector('.boat-stats');
          if (statsEl) {
            statsEl.innerHTML = `
              <div class="boat-s"><div class="v">${t.avg_speed_knots != null ? t.avg_speed_knots.toFixed(1) : '—'} kn</div><div class="l">gem</div></div>
              <div class="boat-s"><div class="v">${t.max_speed_knots != null ? t.max_speed_knots.toFixed(1) : '—'} kn</div><div class="l">max</div></div>`;
          }
        }
      });

      loadTrackOnMap(idx);
      drawSpeedChart(idx);
      updateInfoPanel(idx);
      playbackIdx = 0;
      const slider = document.getElementById('playback-slider');
      if (slider) slider.value = 0;
      document.getElementById('time-display').textContent = '00:00';
    }

    // ── Boat icon ───────────────────────────────────────────────────────
    function createBoatIcon(color, headingDeg) {
      const h = headingDeg != null ? headingDeg : 0;
      return L.divIcon({
        className: 'boat-icon',
        html: `<svg viewBox="-10 -12 20 24" width="24" height="28" style="transform:rotate(${h}deg);filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3))">
          <polygon points="0,-11 -8,5 0,2 8,5" fill="${color}" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>`,
        iconSize: [24, 28],
        iconAnchor: [12, 14],
        tooltipAnchor: [0, -16],
      });
    }

    // Calculate heading between two coordinates (degrees from north)
    function calcHeading(lat1, lon1, lat2, lon2) {
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const lat1r = lat1 * Math.PI / 180;
      const lat2r = lat2 * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2r);
      const x = Math.cos(lat1r) * Math.sin(lat2r) - Math.sin(lat1r) * Math.cos(lat2r) * Math.cos(dLon);
      let deg = Math.atan2(y, x) * 180 / Math.PI;
      return (deg + 360) % 360;
    }

    function updatePlaybackPosition() {
      const track = tracks[activeTrackIdx];
      const coords = track._demoCoords || parseTrackCoords(track);
      if (!coords.length) return;

      const idx2 = Math.min(playbackIdx, coords.length - 1);
      const pos = coords[idx2];
      const t = Math.floor(playbackIdx * 5);
      const mins = Math.floor(t / 60);
      const secs = t % 60;
      document.getElementById('time-display').textContent =
        String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

      // Calculate heading from current to next point
      let heading = 0;
      if (idx2 + 1 < coords.length) {
        heading = calcHeading(pos[0], pos[1], coords[idx2 + 1][0], coords[idx2 + 1][1]);
      } else if (idx2 > 0) {
        heading = calcHeading(coords[idx2 - 1][0], coords[idx2 - 1][1], pos[0], pos[1]);
      }

      // Live speed from speed data
      const speedData = getSpeedData(track);
      const spd = speedData[Math.min(idx2, speedData.length - 1)];

      const color = BOAT_COLORS[activeTrackIdx % BOAT_COLORS.length];

      boatMarkers.forEach(m => map.removeLayer(m));
      boatMarkers = [];
      const icon = createBoatIcon(color, heading);
      const marker = L.marker(pos, { icon }).addTo(map);
      marker.bindTooltip(`${spd.toFixed(1)} kn · ${Math.round(heading)}°`, {
        direction: 'top', offset: [0, -12], permanent: true,
        className: 'boat-tooltip',
      });
      boatMarkers.push(marker);

      // Update active boat in list with live speed
      document.querySelectorAll('.boat-item').forEach(el => {
        const i = parseInt(el.dataset.idx);
        if (i === activeTrackIdx) {
          const statsEl = el.querySelector('.boat-stats');
          if (statsEl) {
            statsEl.innerHTML = `
              <div class="boat-s"><div class="v">${spd.toFixed(1)} kn</div><div class="l">nu</div></div>
              <div class="boat-s"><div class="v">${Math.round(heading)}°</div><div class="l">koers</div></div>`;
          }
        }
      });

      drawSpeedChart(activeTrackIdx);
    }

    function togglePlayback() {
      const btn = document.getElementById('play-btn');
      if (playbackTimer) {
        clearInterval(playbackTimer);
        playbackTimer = null;
        btn.textContent = '▶';
        return;
      }

      btn.textContent = '⏸';
      playbackTimer = setInterval(() => {
        const slider = document.getElementById('playback-slider');
        playbackIdx++;
        if (playbackIdx > 100) {
          clearInterval(playbackTimer);
          playbackTimer = null;
          btn.textContent = '▶';
          playbackIdx = 0;
          slider.value = 0;
          // Reset boat stats
          document.querySelectorAll('.boat-item').forEach((el, i) => {
            if (i < tracks.length) {
              const t = tracks[i];
              const statsEl = el.querySelector('.boat-stats');
              if (statsEl) {
                statsEl.innerHTML = `
                  <div class="boat-s"><div class="v">${t.avg_speed_knots != null ? t.avg_speed_knots.toFixed(1) : '—'} kn</div><div class="l">gem</div></div>
                  <div class="boat-s"><div class="v">${t.max_speed_knots != null ? t.max_speed_knots.toFixed(1) : '—'} kn</div><div class="l">max</div></div>`;
              }
            }
          });
          updatePlaybackPosition();
          return;
        }
        slider.value = playbackIdx;
        updatePlaybackPosition();
      }, 100 / playbackSpeed);
    }

    // ── Load individual track ────────────────────────────────────────────
    async function loadSingleTrack(tid, container) {
      try {
        const track = await apiGet('/tracks/' + tid);
        if (!track || track.error) throw new Error(track?.error || 'Niet gevonden');

        document.getElementById('breadcrumb-race').textContent = track.name || 'Track #' + tid;

        // Fetch GPX coordinates
        let coords = [];
        try {
          const gpxRes = await fetch(API + '/tracks/' + tid + '/gpx', {
            headers: { 'Authorization': 'Bearer ' + getToken() },
          });
          if (gpxRes.ok) {
            const xml = await gpxRes.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, 'text/xml');
            const pts = doc.querySelectorAll('trkpt');
            pts.forEach(pt => {
              const lat = parseFloat(pt.getAttribute('lat'));
              const lon = parseFloat(pt.getAttribute('lon'));
              if (!isNaN(lat) && !isNaN(lon)) coords.push([lat, lon]);
            });
          }
        } catch (_) {}

        // Use demo track if no coords
        const displayCoords = coords.length >= 2 ? coords : generateSailingTrack([52.0, 4.5]);

        const kn = n => n != null ? n.toFixed(1) + ' kn' : '—';
        const dur = track.duration_seconds ? fmtDuration(track.duration_seconds) : '—';
        const dist = track.distance_meters != null ? (track.distance_meters >= 1000 ? (track.distance_meters/1000).toFixed(1) + ' km' : Math.round(track.distance_meters) + ' m') : '—';

        container.innerHTML = `
          <div class="breadcrumb">
            <a href="dashboard.html">Dashboard</a>
            <span>·</span>
            <span>${escHtml(track.name || 'Track #' + tid)}</span>
          </div>

          <div class="race-header">
            <div>
              <h2>${escHtml(track.name || 'Track #' + tid)}</h2>
              <div class="race-meta">${fmtDate(track.recorded_at)} · ${track.point_count || coords.length} punten</div>
            </div>
          </div>

          <div class="map-section">
            <div class="map-container">
              <div id="map"></div>
            </div>
            <div class="map-sidebar">
              <div class="info-panel">
                <h4>Track details</h4>
                <div class="info-grid">
                  <div class="info-cell"><div class="val">${kn(track.max_speed_knots)}</div><div class="lbl">Max snelheid</div></div>
                  <div class="info-cell"><div class="val">${kn(track.avg_speed_knots)}</div><div class="lbl">Gemiddeld</div></div>
                  <div class="info-cell"><div class="val">${dist}</div><div class="lbl">Afstand</div></div>
                  <div class="info-cell"><div class="val">${dur}</div><div class="lbl">Duur</div></div>
                </div>
              </div>
            </div>
          </div>
        `;

        // We coords but need to wrap as pseudo-track for the map functions
        tracks = [Object.assign({}, track, { _coords: displayCoords })];
        initMap();
        const line = L.polyline(displayCoords, {
          color: BOAT_COLORS[0],
          weight: 3,
          opacity: 0.85,
        }).addTo(map);
        trackLines.push(line);
        map.fitBounds(line.getBounds().pad(0.1));

        if (displayCoords.length > 0) {
          const end = displayCoords[displayCoords.length - 1];
          const marker = L.circleMarker(end, {
            radius: 6,
            color: BOAT_COLORS[0],
            fillColor: '#fff',
            fillOpacity: 1,
            weight: 2,
          }).addTo(map);
          marker.bindTooltip('Finish', { direction: 'top' });
        }

      } catch (e) {
        container.innerHTML = '<div class="error-state"><p>Kon track niet laden. <a href="dashboard.html">Ga terug</a>.</p></div>';
      }
    }

    loadRace();

    window.addEventListener('resize', () => {
      if (tracks.length) drawSpeedChart(activeTrackIdx);
    });
  </script>
