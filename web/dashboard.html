<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regatta Screen — Wedstrijden</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dashboard {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 80px;
      width: 100%;
    }

    .dashboard h2 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .dashboard .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .stat-card .stat-val {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .stat-card .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .race-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .race-list-header .card-title { margin: 0; }

    .filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filter-bar .input {
      width: 200px;
      max-width: 100%;
      padding: 7px 12px;
      font-size: 13px;
    }

    .race-item {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      gap: 16px;
    }
    .race-item:hover {
      background: color-mix(in oklch, var(--border), transparent 70%);
      margin: 0 -14px;
      padding: 14px;
      border-radius: var(--radius-sm);
    }
    .race-item:last-child { border-bottom: none; }

    .race-item .race-info { flex: 1; min-width: 0; }
    .race-item .race-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .race-item .race-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .race-item .race-stats {
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }

    .race-item .race-stat { text-align: right; }
    .race-item .race-stat .val {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .race-item .race-stat .lbl {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .race-item .race-arrow {
      color: var(--muted);
      font-size: 18px;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--fg); }
    .empty-state p { font-size: 14px; max-width: 360px; margin: 0 auto; }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .loading-state .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-size: 14px; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 10px 20px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--fg); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Track cards ── */
    .track-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .track-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,10,30,0.03);
    }
    .track-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(0,10,30,0.08);
    }

    .track-card .track-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-card .track-date {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .track-card .track-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .track-card .track-stat .ts-val {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .track-card .track-stat .ts-lbl {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .track-card .track-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
      gap: 8px;
    }

    .track-card .btn-del {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
    }
    .track-card .btn-del:hover { border-color: var(--red); color: var(--red); }

    .btn-join {
      padding: 5px 10px; background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--muted); font-size: 11px; cursor: pointer;
    }
    .btn-join:hover { border-color: var(--accent); color: var(--accent); }

    .join-inline { display: inline-flex; gap: 4px; align-items: center; }

    @media (max-width: 640px) {
      .track-grid { grid-template-columns: 1fr; }
    }

    /* ── Enhanced mobile ── */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      padding: 6px 0 env(safe-area-inset-bottom, 6px) 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .mobile-nav-inner {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .mobile-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 12px;
      font-size: 10px;
      color: var(--muted);
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: color 0.15s;
      min-width: 56px;
    }
    .mobile-nav a.active {
      color: var(--accent);
    }
    .mobile-nav a svg {
      width: 22px;
      height: 22px;
    }

    @media (max-width: 640px) {
      .dashboard { padding: 16px 14px 80px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .race-item { flex-wrap: wrap; }
      .race-item .race-stats { width: 100%; justify-content: space-around; margin-top: 6px; }
      .race-item .race-arrow { display: none; }
      .mobile-nav { display: block; }
      .app-header .nav { display: none; }
    }
  </style>
</head>
<body>
  <header class="app-header"></header>

  <div class="dashboard">
    <h2>Dashboard</h2>
    <p class="subtitle" id="subtitle">Je race-track data</p>

    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="stat-races">—</div>
        <div class="stat-label">Wedstrijden</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-tracks">—</div>
        <div class="stat-label">GPX-tracks</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-distance">—</div>
        <div class="stat-label">Totaal afstand (nm)</div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="races">Wedstrijden</button>
      <button class="tab-btn" data-tab="tracks">Mijn tracks</button>
    </div>

    <!-- ═══ Wedstrijden ═══ -->
    <div id="tab-races">
      <div class="card">
        <div class="race-list-header">
          <span class="card-title">Race overzicht</span>
          <div class="filter-bar">
            <input class="input" id="search-input" placeholder="Zoek wedstrijd…" />
          </div>
        </div>
        <div id="race-list">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Wedstrijden laden…</p>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ Mijn tracks ═══ -->
    <div id="tab-tracks" style="display:none">
      <div class="card">
        <div class="race-list-header">
          <span class="card-title">Mijn GPX tracks</span>
        </div>
        <div id="track-grid" class="track-grid">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Tracks laden…</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a href="dashboard.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Wedstrijden</span>
      </a>
      <a href="race.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 3"/></svg>
        <span>Race</span>
      </a>
      <a href="race-compare.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 4h4v4"/><path d="M20 4L9 15"/><path d="M8 20H4v-4"/><path d="M4 20l7-7"/></svg>
        <span>Vergelijk</span>
      </a>
    </div>
  </nav>

  <script src="script.js"></script>
  <script>
    requireAuth();
    checkAdmin().then(() => renderHeader('dashboard'));

    let races = [];
    let tracks = [];
    let currentTab = 'races';

    // ── Tab switching ──
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        document.getElementById('tab-races').style.display = currentTab === 'races' ? 'block' : 'none';
        document.getElementById('tab-tracks').style.display = currentTab === 'tracks' ? 'block' : 'none';
      });
    });

    async function loadData() {
      try {
        [races, tracks] = await Promise.all([
          apiGet('/races') || [],
          apiGet('/tracks') || [],
        ]);

        if (!Array.isArray(races)) races = [];
        if (!Array.isArray(tracks)) tracks = [];

        document.getElementById('stat-races').textContent = races.length;
        document.getElementById('stat-tracks').textContent = tracks.length;

        // Bereken totale afstand in nautische mijlen
        let totalNm = 0;
        if (Array.isArray(tracks)) {
          totalNm = tracks.reduce((sum, t) => sum + ((t.distance_meters || 0) / 1852), 0);
        }
        document.getElementById('stat-distance').textContent = totalNm.toFixed(1) + ' nm';

        renderRaces(races);
        renderTracks(tracks);
      } catch (e) {
        document.getElementById('race-list').innerHTML =
          '<div class="empty-state"><p>Kon gegevens niet laden. Probeer opnieuw in te loggen.</p></div>';
      }
    }

    function renderRaces(list) {
      const container = document.getElementById('race-list');

      if (!list.length) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 28 28" fill="none" stroke="var(--muted)" stroke-width="1.5">
              <path d="M14 3L6 18h16L14 3z"/>
              <path d="M14 18v7"/>
              <path d="M10 25h8"/>
            </svg>
            <h3>Nog geen wedstrijden</h3>
            <p>Voer een deelnamecode in bij een track om hier wedstrijden te zien.</p>
          </div>`;
        return;
      }

      // Group by series
      const bySeries = {};
      const standalone = [];
      list.forEach(r => {
        if (r.series_name) {
          const key = r.series_name + (r.series_season ? ' · ' + r.series_season : '');
          if (!bySeries[key]) bySeries[key] = [];
          bySeries[key].push(r);
        } else {
          standalone.push(r);
        }
      });

      let html = '';

      Object.keys(bySeries).sort().forEach(sname => {
        html += `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);padding:16px 0 4px">${escHtml(sname)}</div>`;
        bySeries[sname].forEach(r => {
          const date = r.race_date ? fmtDate(r.race_date) : '—';
          const trackCount = r.participant_count || '—';
          const myCount = r.my_track_count || 0;
          html += `
            <div class="race-item" onclick="openRace(${r.id})">
              <div class="race-info">
                <div class="race-name">${escHtml(r.name)}</div>
                <div class="race-meta">${date}${myCount > 0 ? ' · ' + myCount + ' van jou' : ''}</div>
              </div>
              <div class="race-stats">
                <div class="race-stat">
                  <div class="val">${trackCount}</div>
                  <div class="lbl">boten</div>
                </div>
              </div>
              <div class="race-arrow">→</div>
            </div>`;
        });
      });

      standalone.forEach(r => {
        const date = r.race_date ? fmtDate(r.race_date) : '—';
        const trackCount = r.participant_count || '—';
        html += `
          <div class="race-item" onclick="openRace(${r.id})">
            <div class="race-info">
              <div class="race-name">${escHtml(r.name)}</div>
              <div class="race-meta">${date}</div>
            </div>
            <div class="race-stats">
              <div class="race-stat">
                <div class="val">${trackCount}</div>
                <div class="lbl">boten</div>
              </div>
            </div>
            <div class="race-arrow">→</div>
          </div>`;
      });

      container.innerHTML = html;
    }

    function openRace(id) {
      sessionStorage.setItem('raceId', id);
      window.location.href = 'race.html';
    }

    function openTrack(id) {
      window.location.href = 'race.html?id=' + id;
    }

    function renderTracks(list) {
      const grid = document.getElementById('track-grid');
      if (!list || !list.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <svg viewBox="0 0 28 28" fill="none" stroke="var(--muted)" stroke-width="1.5">
              <path d="M14 3L6 18h16L14 3z"/>
              <path d="M14 18v7"/>
              <path d="M10 25h8"/>
            </svg>
            <h3>Nog geen tracks</h3>
            <p>Start een race in de Regatta Screen app en je tracks verschijnen hier automatisch.</p>
          </div>`;
        return;
      }

      const MS_TO_KNOTS = 1.94384;

      grid.innerHTML = list.map(t => {
        const name = escHtml(t.name || t.filename || 'Track #' + t.id);
        const date = fmtDate(t.recorded_at);
        const dur = t.duration_seconds ? fmtDuration(t.duration_seconds) : '—';
        const dist = t.distance_meters != null ? (t.distance_meters >= 1000 ? (t.distance_meters/1000).toFixed(1) + ' km' : Math.round(t.distance_meters) + ' m') : '—';
        const maxKn = t.max_speed_knots != null ? t.max_speed_knots.toFixed(1) + ' kn' : '—';
        const avgKn = t.avg_speed_knots != null ? t.avg_speed_knots.toFixed(1) + ' kn' : '—';
        return `
          <div class="track-card" onclick="openTrack(${t.id})" data-track-id="${t.id}">
            <div class="track-name">${name}</div>
            <div class="track-date">${date}</div>
            <div class="track-stats">
              <div class="track-stat"><div class="ts-val">${maxKn}</div><div class="ts-lbl">Max snelheid</div></div>
              <div class="track-stat"><div class="ts-val">${avgKn}</div><div class="ts-lbl">Gemiddeld</div></div>
              <div class="track-stat"><div class="ts-val">${dist}</div><div class="ts-lbl">Afstand</div></div>
              <div class="track-stat"><div class="ts-val">${dur}</div><div class="ts-lbl">Duur</div></div>
              <div class="track-stat"><div class="ts-val">${t.wind_direction_deg != null ? Math.round(t.wind_direction_deg) + '°' : '—'} <span style="font-size:10px;opacity:0.6">${degToCompass(t.wind_direction_deg)}</span></div><div class="ts-lbl">Wind</div></div>
            </div>
            <div class="track-actions">
              <button class="btn-join" onclick="event.stopPropagation();showJoinInput(this)" data-track-id="${t.id}">🔗 Koppelen</button>
              <span class="join-inline" style="display:none">
                <input class="join-input" placeholder="Deelnamecode" style="width:120px;padding:4px 8px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--fg);outline:none" />
                <button class="btn-join-go" style="padding:4px 10px;font-size:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer">OK</button>
              </span>
              <button class="btn-del" onclick="event.stopPropagation();deleteTrackClicked(this)">Verwijder</button>
            </div>
          </div>`;
      }).join('');
    }

    function degToCompass(deg) {
      if (deg == null) return '';
      const dirs = ['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    async function deleteTrackClicked(btn) {
      const card = btn.closest('.track-card');
      const id = parseInt(card.dataset.trackId);
      const name = card.querySelector('.track-name').textContent;
      if (!confirm('Weet je zeker dat je "' + name + '" wilt verwijderen?')) return;
      try {
        await fetch(API + '/tracks/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + getToken() },
        });
        tracks = tracks.filter(t => t.id !== id);
        document.getElementById('stat-tracks').textContent = tracks.length;
        let totalNm = tracks.reduce((sum, t) => sum + ((t.distance_meters || 0) / 1852), 0);
        document.getElementById('stat-distance').textContent = totalNm.toFixed(1) + ' nm';
        renderTracks(tracks);
      } catch (e) {
        alert('Verwijderen mislukt: ' + e.message);
      }
    }

    async function showJoinInput(btn) {
      const card = btn.closest('.track-card');
      const inline = card.querySelector('.join-inline');
      const joinBtn = card.querySelector('.btn-join');
      const input = card.querySelector('.join-input');
      const goBtn = card.querySelector('.btn-join-go');

      if (inline.style.display === 'none' || !inline.style.display) {
        inline.style.display = 'inline-flex';
        joinBtn.style.display = 'none';
        input.value = '';
        input.focus();
        goBtn.onclick = async () => {
          const code = input.value.trim().toUpperCase();
          if (!code) return;
          const trackId = parseInt(card.dataset.trackId);
          try {
            const res = await fetch(API + '/join', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + getToken(),
              },
              body: JSON.stringify({ code, track_id: trackId }),
            });
            if (!res.ok) {
              const data = await res.json();
              throw new Error(data.error || 'Mislukt');
            }
            alert('Track gekoppeld!');
            inline.style.display = 'none';
            joinBtn.style.display = '';
          } catch (e) {
            alert('Koppelen mislukt: ' + (e.message || 'onbekende fout'));
          }
        };
      } else {
        inline.style.display = 'none';
        joinBtn.style.display = '';
      }
    }

    document.getElementById('search-input').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      const filtered = races.filter(r => {
        const name = (r.name || r.label || '').toLowerCase();
        return name.includes(q);
      });
      renderRaces(filtered);
    });

    loadData();
  </script>
</body>
</html>
