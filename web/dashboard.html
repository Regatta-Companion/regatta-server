<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regatta Screen — Wedstrijden</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dashboard {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 80px;
      width: 100%;
    }

    .dashboard h2 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .dashboard .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .stat-card .stat-val {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .stat-card .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .race-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .race-list-header .card-title { margin: 0; }

    .filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filter-bar .input {
      width: 200px;
      max-width: 100%;
      padding: 7px 12px;
      font-size: 13px;
    }

    .race-item {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      gap: 16px;
    }
    .race-item:hover {
      background: color-mix(in oklch, var(--border), transparent 70%);
      margin: 0 -14px;
      padding: 14px;
      border-radius: var(--radius-sm);
    }
    .race-item:last-child { border-bottom: none; }

    .race-item .race-info { flex: 1; min-width: 0; }
    .race-item .race-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .race-item .race-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .race-item .race-stats {
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }

    .race-item .race-stat { text-align: right; }
    .race-item .race-stat .val {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .race-item .race-stat .lbl {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .race-item .race-arrow {
      color: var(--muted);
      font-size: 18px;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--fg); }
    .empty-state p { font-size: 14px; max-width: 360px; margin: 0 auto; }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .loading-state .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-size: 14px; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 10px 20px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--fg); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Track cards ── */
    .track-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .track-table th {
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 8px 12px;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    .track-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .track-table tr {
      cursor: pointer;
      transition: background 0.12s;
    }
    .track-table tbody tr:hover {
      background: color-mix(in oklch, var(--fg), transparent 95%);
    }
    .track-table .td-name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }
    .track-table .td-num {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }
    .track-table .td-date {
      color: var(--muted);
      white-space: nowrap;
    }
    .track-table .td-actions {
      text-align: right;
      white-space: nowrap;
    }

    .btn-join {
      padding: 4px 8px; background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--muted); font-size: 11px; cursor: pointer;
    }
    .btn-join:hover { border-color: var(--accent); color: var(--accent); }

    .btn-dl {
      padding: 4px 8px; background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--muted); font-size: 11px; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-dl:hover { border-color: var(--accent); color: var(--accent); }

    .join-inline { display: inline-flex; gap: 4px; align-items: center; }

    /* ── Enhanced mobile ── */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      padding: 6px 0 env(safe-area-inset-bottom, 6px) 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .mobile-nav-inner {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .mobile-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 12px;
      font-size: 10px;
      color: var(--muted);
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: color 0.15s;
      min-width: 56px;
    }
    .mobile-nav a.active {
      color: var(--accent);
    }
    .mobile-nav a svg {
      width: 22px;
      height: 22px;
    }

    @media (max-width: 640px) {
      .dashboard { padding: 16px 14px 80px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .race-item { flex-wrap: wrap; }
      .race-item .race-stats { width: 100%; justify-content: space-around; margin-top: 6px; }
      .race-item .race-arrow { display: none; }
      .mobile-nav { display: block; }
      .app-header .nav { display: none; }
    }
  </style>
</head>
<body>
  <header class="app-header"></header>

  <div class="dashboard">
    <h2>Dashboard</h2>
    <p class="subtitle" id="subtitle">Mijn GPX-track data</p>

    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="stat-tracks">—</div>
        <div class="stat-label">GPX-tracks</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-distance">—</div>
        <div class="stat-label">Totaal afstand (nm)</div>
      </div>
    </div>

    <!-- ═══ Mijn tracks ═══ -->
    <div class="card">
      <div class="race-list-header">
        <span class="card-title">Mijn GPX tracks</span>
      </div>
      <div id="track-grid">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Tracks laden…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a href="dashboard.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Mijn data</span>
      </a>
      <a href="races.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 3L6 18h16L14 3z"/><path d="M14 18v7"/><path d="M10 25h8"/></svg>
        <span>Wedstrijden</span>
      </a>
      <a href="race.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 3"/></svg>
        <span>Race</span>
      </a>
      <a href="race-compare.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 4h4v4"/><path d="M20 4L9 15"/><path d="M8 20H4v-4"/><path d="M4 20l7-7"/></svg>
        <span>Vergelijk</span>
      </a>
    </div>
  </nav>

  <script src="script.js"></script>
  <script>
    requireAuth();
    checkAdmin().then(() => renderHeader('dashboard'));

    let tracks = [];

    async function loadData() {
      try {
        tracks = await apiGet('/tracks') || [];
        if (!Array.isArray(tracks)) tracks = [];

        document.getElementById('stat-tracks').textContent = tracks.length;

        let totalNm = 0;
        if (Array.isArray(tracks)) {
          totalNm = tracks.reduce((sum, t) => sum + ((t.distance_meters || 0) / 1852), 0);
        }
        document.getElementById('stat-distance').textContent = totalNm.toFixed(1) + ' nm';

        renderTracks(tracks);
      } catch (e) {
        document.getElementById('track-grid').innerHTML =
          '<div class="empty-state"><p>Kon gegevens niet laden. Probeer opnieuw in te loggen.</p></div>';
      }
    }

    function openTrack(id) {
      window.location.href = 'race.html?id=' + id;
    }

    function renderTracks(list) {
      const grid = document.getElementById('track-grid');
      if (!list || !list.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 28 28" fill="none" stroke="var(--muted)" stroke-width="1.5">
              <path d="M14 3L6 18h16L14 3z"/>
              <path d="M14 18v7"/>
              <path d="M10 25h8"/>
            </svg>
            <h3>Nog geen tracks</h3>
            <p>Start een race in de Regatta Screen app en je tracks verschijnen hier automatisch.</p>
          </div>`;
        return;
      }

      let html = `<table class="track-table">
        <thead><tr>
          <th>Naam</th>
          <th>Datum</th>
          <th style="text-align:right">Max</th>
          <th style="text-align:right">Gem.</th>
          <th style="text-align:right">Afstand</th>
          <th style="text-align:right">Duur</th>
          <th style="text-align:right">Wind</th>
          <th style="text-align:right">Acties</th>
        </tr></thead>
        <tbody>`;

      list.forEach(t => {
        const name = escHtml(t.name || t.filename || 'Track #' + t.id);
        const date = fmtDate(t.recorded_at);
        const dur = t.duration_seconds ? fmtDuration(t.duration_seconds) : '—';
        const dist = t.distance_meters != null ? (t.distance_meters >= 1000 ? (t.distance_meters/1000).toFixed(1) + ' km' : Math.round(t.distance_meters) + ' m') : '—';
        const maxKn = t.max_speed_knots != null ? t.max_speed_knots.toFixed(1) + ' kn' : '—';
        const avgKn = t.avg_speed_knots != null ? t.avg_speed_knots.toFixed(1) + ' kn' : '—';
        const wind = t.wind_direction_deg != null ? Math.round(t.wind_direction_deg) + '° ' + degToCompass(t.wind_direction_deg) : '—';
        html += `
          <tr onclick="openTrack(${t.id})" data-track-id="${t.id}">
            <td class="td-name">${name}</td>
            <td class="td-date">${date}</td>
            <td class="td-num">${maxKn}</td>
            <td class="td-num">${avgKn}</td>
            <td class="td-num">${dist}</td>
            <td class="td-num">${dur}</td>
            <td class="td-num">${wind}</td>
            <td class="td-actions">
              <button class="btn-dl" onclick="event.stopPropagation();downloadGpx(${t.id}, '${escHtml(t.filename || '')}')">⬇ GPX</button>
              <button class="btn-join" onclick="event.stopPropagation();showJoinInput(this)" data-track-id="${t.id}">🔗</button>
              <span class="join-inline" style="display:none">
                <input class="join-input" placeholder="Code" style="width:80px;padding:3px 6px;font-size:11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--fg);outline:none" />
                <button class="btn-join-go" style="padding:3px 8px;font-size:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer">OK</button>
              </span>
            </td>
          </tr>`;
      });

      html += '</tbody></table>';
      grid.innerHTML = html;
    }

    function degToCompass(deg) {
      if (deg == null) return '';
      const dirs = ['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    async function downloadGpx(id, filename) {
      try {
        const res = await fetch(API + '/tracks/' + id + '/gpx', {
          headers: { 'Authorization': 'Bearer ' + getToken() },
        });
        if (!res.ok) throw new Error('Download mislukt');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename || ('track_' + id + '.gpx');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('GPX download mislukt: ' + e.message);
      }
    }

    async function deleteTrackClicked(btn) {
      const row = btn.closest('tr');
      const id = parseInt(row.dataset.trackId);
      const name = row.querySelector('.td-name').textContent;
      if (!confirm('Weet je zeker dat je "' + name + '" wilt verwijderen?')) return;
      try {
        await fetch(API + '/tracks/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + getToken() },
        });
        tracks = tracks.filter(t => t.id !== id);
        document.getElementById('stat-tracks').textContent = tracks.length;
        let totalNm = tracks.reduce((sum, t) => sum + ((t.distance_meters || 0) / 1852), 0);
        document.getElementById('stat-distance').textContent = totalNm.toFixed(1) + ' nm';
        renderTracks(tracks);
      } catch (e) {
        alert('Verwijderen mislukt: ' + e.message);
      }
    }

    async function showJoinInput(btn) {
      const row = btn.closest('tr');
      const inline = row.querySelector('.join-inline');
      const joinBtn = row.querySelector('.btn-join');
      const input = row.querySelector('.join-input');
      const goBtn = row.querySelector('.btn-join-go');

      if (inline.style.display === 'none' || !inline.style.display) {
        inline.style.display = 'inline-flex';
        joinBtn.style.display = 'none';
        input.value = '';
        input.focus();
        goBtn.onclick = async () => {
          const code = input.value.trim().toUpperCase();
          if (!code) return;
          const trackId = parseInt(card.dataset.trackId);
          try {
            const res = await fetch(API + '/join', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + getToken(),
              },
              body: JSON.stringify({ code, track_id: trackId }),
            });
            if (!res.ok) {
              const data = await res.json();
              throw new Error(data.error || 'Mislukt');
            }
            alert('Track gekoppeld!');
            inline.style.display = 'none';
            joinBtn.style.display = '';
          } catch (e) {
            alert('Koppelen mislukt: ' + (e.message || 'onbekende fout'));
          }
        };
      } else {
        inline.style.display = 'none';
        joinBtn.style.display = '';
      }
    }

    loadData();
  </script>
</body>
</html>
