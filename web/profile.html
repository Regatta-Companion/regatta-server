<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regatta Screen — Profiel</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .profile-page { max-width: 520px; margin: 0 auto; padding: 20px 24px 80px; width: 100%; }
    .profile-page h2 {
      font-family: var(--font-display); font-size: 26px; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .profile-page .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 22px 24px; margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }
    .card h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); margin-bottom: 5px;
    }
    .field .input {
      width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--fg); font-family: var(--font-body);
      font-size: 14px; outline: none;
    }
    .field .input:focus { border-color: var(--accent); }

    .btn-save {
      width: 100%; padding: 11px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm); font-family: var(--font-body);
      font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: oklch(38% 0.14 260); }

    .toast {
      padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 14px;
    }
    .toast-ok { background: color-mix(in oklch, var(--green), transparent 88%); color: var(--green); }
    .toast-err { background: color-mix(in oklch, var(--red), transparent 88%); color: var(--red); }

    .btn-danger {
      width: 100%; padding: 11px; background: transparent; color: var(--red);
      border: 1px solid var(--red); border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 14px; cursor: pointer;
      margin-top: 8px; transition: background 0.15s;
    }
    .btn-danger:hover { background: color-mix(in oklch, var(--red), transparent 92%); }

    .status-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .status-row:last-child { border-bottom: none; }
    .status-row .label { font-size: 13px; color: var(--muted); }
    .status-row .value { font-size: 13px; font-weight: 600; font-family: var(--font-mono); }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-dot.connected { background: var(--green); }
    .status-dot.disconnected { background: var(--muted); }
    .garmin-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .spinner-inline { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .profile-page { padding: 14px 14px 80px; }
    }
  </style>
</head>
<body>
  <header class="app-header"></header>

  <div class="profile-page">
    <h2>Profiel</h2>
    <p class="subtitle" id="profile-email">—</p>

    <div id="toast"></div>

    <div class="card">
      <h3>Boot & Team</h3>
      <div class="field">
        <label for="pf-boat-type">Boot type</label>
        <input id="pf-boat-type" class="input" placeholder="bijv. Randmeer, Valk, Laser" />
      </div>
      <div class="field">
        <label for="pf-boat-name">Boot naam</label>
        <input id="pf-boat-name" class="input" placeholder="bijv. De Vliegende Hollander" />
      </div>
      <div class="field">
        <label for="pf-team-name">Team naam</label>
        <input id="pf-team-name" class="input" placeholder="bijv. WV de Zuidwal" />
      </div>
      <button class="btn-save" onclick="saveProfile()">Opslaan</button>
    </div>

    <div class="card">
      <h3>Automatisch koppelen</h3>
      <div class="field">
        <label for="pf-race-code">Race code</label>
        <input id="pf-race-code" class="input" placeholder="bijv. ABC123" style="text-transform:uppercase" />
        <div style="font-size:11px;color:var(--muted);margin-top:4px">
          Vul hier de 6-letterige boot-code in. Bij een nieuwe GPX-upload wordt automatisch gezocht naar een wedstrijd met deze code waarvan de datum overeenkomt.
        </div>
      </div>
      <button class="btn-save" onclick="saveProfile()">Opslaan</button>
    </div>

    <div class="card" style="text-align:center;padding:16px 24px">
      <div id="garmin-section">
        <div id="garmin-loading" style="text-align:center;padding:20px;color:var(--muted)">Laden…</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    requireAuth();
    checkAdmin().then(() => renderHeader('profile'));

    async function loadProfile() {
      try {
        const data = await apiGet('/auth/me');
        document.getElementById('profile-email').textContent = data.email || '';
        document.getElementById('pf-boat-type').value = data.boatType || '';
        document.getElementById('pf-boat-name').value = data.boatName || '';
        document.getElementById('pf-team-name').value = data.teamName || '';
        document.getElementById('pf-race-code').value = data.raceCode || '';
      } catch (e) {
        showToast('Kon profiel niet laden.', 'err');
      }
    }

    async function saveProfile() {
      const boat_type = document.getElementById('pf-boat-type').value.trim();
      const boat_name = document.getElementById('pf-boat-name').value.trim();
      const team_name = document.getElementById('pf-team-name').value.trim();
      const race_code = document.getElementById('pf-race-code').value.trim().toUpperCase();

      // Only send fields that have a value (missing = don't touch in DB)
      const body = {};
      if (boat_type) body.boat_type = boat_type;
      if (boat_name) body.boat_name = boat_name;
      if (team_name) body.team_name = team_name;
      if (race_code) body.race_code = race_code;

      try {
        const res = await fetch(API + '/auth/profile', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getToken(),
          },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error('Mislukt');
        showToast('Profiel opgeslagen!', 'ok');
      } catch (e) {
        showToast('Opslaan mislukt.', 'err');
      }
    }

    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.innerHTML = `<div class="toast toast-${type}">${msg}</div>`;
      setTimeout(() => { el.innerHTML = ''; }, 3000);
    }

    loadProfile();

    // ── Garmin Connect inline ─────────────────────────────────

    async function loadGarminStatus() {
      try {
        const data = await apiGet('/garmin/status');
        renderGarminSection(data);
      } catch (e) {
        document.getElementById('garmin-loading').innerHTML =
          '<span style="color:var(--muted)">Kon Garmin-status niet laden.</span>';
      }
    }

    function renderGarminSection(data) {
      const el = document.getElementById('garmin-section');
      const linked = data.linked;
      el.innerHTML = `
        <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">⛵ Garmin Connect</h3>
        <div class="status-row">
          <span class="label"><span class="status-dot ${linked ? 'connected' : 'disconnected'}"></span>Status</span>
          <span class="value">${linked ? 'Gekoppeld' : 'Niet gekoppeld'}</span>
        </div>
        ${linked ? `
          <div class="status-row">
            <span class="label">Laatste sync</span>
            <span class="value">${data.last_sync_at ? fmtDate(data.last_sync_at) : 'Nog niet'}</span>
          </div>
          ${data.sync_result ? `
          <div class="status-row">
            <span class="label">Resultaat</span>
            <span class="value">${escHtml(data.sync_result)}</span>
          </div>
          ` : ''}
          ${data.sync_stderr ? `
          <div style="margin-top:6px;padding:8px;background:color-mix(in oklch, var(--red), transparent 92%);border-radius:4px;font-size:11px;font-family:var(--font-mono);color:var(--red);max-height:120px;overflow-y:auto;white-space:pre-wrap">${escHtml(data.sync_stderr)}</div>
          ` : ''}
        ` : ''}
        <div style="margin-top:12px">
          ${linked ? `
            <button class="btn-save" style="margin-bottom:6px" onclick="syncGarmin()">Nu synchroniseren</button>
            <button class="btn-danger" onclick="disconnectGarmin()">Ontkoppelen</button>
          ` : `
            <div class="field">
              <label for="gc-email">Garmin Connect e-mail</label>
              <input id="gc-email" type="email" class="input" placeholder="jouw@email.com" autocomplete="username" />
            </div>
            <div class="field">
              <label for="gc-password">Garmin Connect wachtwoord</label>
              <input id="gc-password" type="password" class="input" placeholder="••••••••" autocomplete="current-password" />
              <div class="garmin-hint">Alleen zeilactiviteiten (sailing) worden opgehaald.</div>
            </div>
            <button class="btn-save" onclick="connectGarmin()">Koppelen</button>
          `}
        </div>
      `;
    }

    async function connectGarmin() {
      const email = document.getElementById('gc-email').value.trim();
      const password = document.getElementById('gc-password').value;
      if (!email || !password) { showToast('Vul e-mail en wachtwoord in.', 'err'); return; }
      try {
        await apiPost('/garmin/connect', { email, password });
        showToast('Garmin Connect gekoppeld!', 'ok');
        loadGarminStatus();
      } catch (e) {
        showToast('Koppelen mislukt: ' + (e.message || 'onbekende fout'), 'err');
      }
    }

    async function disconnectGarmin() {
      if (!confirm('Weet je zeker dat je Garmin Connect wilt ontkoppelen?')) return;
      try {
        await fetch(API + '/garmin/connect', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + getToken() }});
        showToast('Garmin Connect ontkoppeld.', 'ok');
        loadGarminStatus();
      } catch (e) {
        showToast('Ontkoppelen mislukt.', 'err');
      }
    }

    async function syncGarmin() {
      try {
        const btn = document.querySelector('#garmin-section .btn-save');
        btn.disabled = true; btn.innerHTML = '<span class="spinner-inline"></span> Synchroniseren…';
        const res = await apiPost('/garmin/sync', {});
        showToast(res.message || 'Sync gestart! Tracks verschijnen straks onder Mijn tracks.', 'ok');
        setTimeout(() => loadGarminStatus(), 5000);
      } catch (e) {
        showToast('Sync mislukt: ' + (e.message || 'onbekende fout'), 'err');
        loadGarminStatus();
      }
    }

    loadGarminStatus();
  </script>
</body>
</html>
