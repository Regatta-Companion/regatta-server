<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regatta Screen — Boten vergelijken</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    .compare-page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 24px 80px;
      width: 100%;
    }
    .compare-page .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted); margin-bottom: 16px;
    }
    .compare-page .breadcrumb a { color: var(--muted); }
    .compare-page .breadcrumb a:hover { color: var(--fg); }
    .compare-page h2 {
      font-family: var(--font-display); font-size: 26px; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .compare-page .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    /* ── Track selector ── */
    .track-selector { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
    .track-chip {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; cursor: pointer; font-size: 13px;
      transition: all 0.15s; user-select: none;
      box-shadow: 0 1px 4px rgba(0,10,30,0.04);
    }
    .track-chip:hover { border-color: var(--muted); }
    .track-chip.selected {
      border-color: var(--accent);
      background: color-mix(in oklch, var(--accent-light), var(--surface) 70%);
    }
    .track-chip .chip-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Playback bar ── */
    .playback-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      margin-bottom: 16px; flex-wrap: wrap;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }
    .playback-bar .btn-play {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: var(--accent); color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .playback-bar .btn-play:hover { background: var(--accent-dark, var(--accent)); }
    .playback-bar .btn-play svg { width: 16px; height: 16px; }
    .playback-bar .time-display {
      font-family: var(--font-mono); font-size: 14px; font-weight: 600;
      font-variant-numeric: tabular-nums; min-width: 70px; text-align: center;
    }
    .playback-bar input[type="range"] { flex: 1; min-width: 120px; }
    .playback-bar .speed-group { display: flex; gap: 4px; align-items: center; }
    .playback-bar .speed-label { font-size: 11px; color: var(--muted); }
    .playback-bar .speed-btn {
      padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface); cursor: pointer; font-size: 12px;
      font-family: var(--font-mono); transition: all 0.15s;
    }
    .playback-bar .speed-btn.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ── Comparison layout ── */
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .compare-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }
    .compare-card .compare-header {
      display: flex; align-items: center; gap: 10px; padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .compare-card .compare-header .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .compare-card .compare-header .name { font-weight: 600; font-size: 14px; }
    .compare-card .compare-body { padding: 16px; }
    .compare-stat-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .compare-stat-row:last-child { border-bottom: none; }
    .compare-stat-row .label { font-size: 12px; color: var(--muted); }
    .compare-stat-row .value {
      font-family: var(--font-mono); font-size: 16px; font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* ── Map ── */
    .map-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); overflow: hidden; margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }
    .map-section .map-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .map-section .map-header h4 { font-size: 13px; font-weight: 600; }
    .map-legend { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .map-legend .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .map-legend .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    #compare-map { width: 100%; height: 450px; background: var(--bg); }

    /* ── Boat marker ── */
    .boat-marker-icon {
      transition: transform 0.08s linear !important;
    }
    .boat-icon-svg {
      transition: transform 0.08s linear;
    }

    /* ── Speed chart ── */
    .chart-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 20px; margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }
    .chart-section .chart-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .chart-section .chart-header h4 { font-size: 13px; font-weight: 600; }
    #compare-chart { width: 100%; height: 260px; display: block; border-radius: var(--radius-sm); }

    .loading-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .loading-state .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-size: 14px; }

    /* ── Fullscreen overlay ── */
    .btn-fullscreen {
      padding: 5px 10px; background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--muted); font-size: 11px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-fullscreen:hover { border-color: var(--accent); color: var(--accent); }

    .fullscreen-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: var(--bg); flex-direction: column;
    }
    .fullscreen-overlay.active { display: flex; }

    .fs-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 12px;
    }
    .fs-topbar h3 { font-size: 14px; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fs-topbar .fs-exit {
      padding: 4px 10px; background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--muted); font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    .fs-topbar .fs-exit:hover { border-color: var(--red); color: var(--red); }

    .fs-body { display: flex; flex: 1; min-height: 0; }

    .fs-sidebar {
      width: 280px; flex-shrink: 0; overflow-y: auto; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
    }
    .fs-sidebar h4 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 10px 12px 6px; margin: 0; }

    .fs-boat-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .fs-boat-table th {
      text-align: left; font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); padding: 6px 8px;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface);
    }
    .fs-boat-table td {
      padding: 5px 8px; border-bottom: 1px solid color-mix(in oklch, var(--border), transparent 50%);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px;
    }
    .fs-boat-table tr { cursor: pointer; transition: background 0.1s; }
    .fs-boat-table tbody tr:hover { background: color-mix(in oklch, var(--fg), transparent 95%); }
    .fs-boat-table tr.active { background: color-mix(in oklch, var(--accent), transparent 90%); }
    .fs-boat-table .td-name { font-weight: 600; max-width: 90px; }
    .fs-boat-table .td-num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; }

    .fs-map { flex: 1; position: relative; }
    .fs-map #fs-map-container { width: 100%; height: 100%; }

    .fs-bottombar {
      display: flex; align-items: center; gap: 8px; padding: 8px 16px;
      background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .fs-bottombar .play-btn {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .fs-bottombar .play-btn:hover { background: oklch(38% 0.14 260); }
    .fs-bottombar .time-display { font-family: var(--font-mono); font-size: 13px; min-width: 50px; text-align: center; }
    .fs-bottombar input[type="range"] { flex: 1; }
    .fs-bottombar .speed-group { display: flex; gap: 4px; }
    .fs-bottombar .speed-btn {
      padding: 3px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: transparent; color: var(--muted); font-size: 11px; cursor: pointer;
    }
    .fs-bottombar .speed-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Fullscreen labels toggle */
    #fs-map-container.hide-labels .boat-tooltip { display: none !important; }

    /* ── Mobile ── */
    .mobile-nav {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border); z-index: 200;
      padding: 6px 0 env(safe-area-inset-bottom, 6px) 0;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .mobile-nav-inner { display: flex; justify-content: space-around; align-items: center; }
    .mobile-nav a {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 8px 12px; font-size: 10px; color: var(--muted);
      text-decoration: none; border-radius: var(--radius-sm); transition: color 0.15s; min-width: 56px;
    }
    .mobile-nav a.active { color: var(--accent); }
    .mobile-nav a svg { width: 22px; height: 22px; }

    @media (max-width: 768px) {
      .compare-page { padding: 14px 14px 80px; }
      .compare-grid { grid-template-columns: 1fr; }
      #compare-map { height: 320px; }
      .mobile-nav { display: block; }
      .app-header .nav { display: none; }
    }

    /* ── Range input styling ── */
    input[type="range"] {
      -webkit-appearance: none; appearance: none; height: 6px;
      background: var(--border); border-radius: 3px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      background: var(--accent); border-radius: 50%; cursor: pointer;
      border: 2px solid var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px; background: var(--accent);
      border-radius: 50%; cursor: pointer; border: 2px solid var(--surface);
    }

    /* Boat tooltip */
    .boat-tooltip {
      background: rgba(0,0,0,0.75) !important;
      border: none !important;
      border-radius: 6px !important;
      color: #fff !important;
      font-family: var(--font-mono) !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      padding: 4px 8px !important;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2) !important;
    }
    .boat-tooltip::before { display: none !important; }
    .hide-labels .boat-tooltip { display: none !important; }
  </style>
</head>
<body>
  <header class="app-header"></header>
  <div class="compare-page">
    <div class="breadcrumb">
      <a href="dashboard.html">Wedstrijden</a> <span>·</span>
      <a href="race.html" id="breadcrumb-race-link">Race</a> <span>·</span>
      <span>Vergelijken</span>
    </div>

    <h2>Boten vergelijken</h2>
    <p class="subtitle">Selecteer boten, druk op play en zie ze over de kaart varen
      <button class="btn-fullscreen" onclick="openFullscreen()" style="margin-left:12px">⛶ Volledig scherm</button>
    </p>

    <div id="compare-content">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Gegevens laden…</p>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Mijn data</span>
      </a>
      <a href="races.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 3L6 18h16L14 3z"/><path d="M14 18v7"/><path d="M10 25h8"/></svg>
        <span>Wedstrijden</span>
      </a>
      <a href="race.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 3"/></svg>
        <span>Race</span>
      </a>
      <a href="race-compare.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 4h4v4"/><path d="M20 4L9 15"/><path d="M8 20H4v-4"/><path d="M4 20l7-7"/></svg>
        <span>Vergelijk</span>
      </a>
    </div>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
  <script>
    requireAuth();
    checkAdmin().then(() => renderHeader('compare'));

    // ?race= is leidend; sessionStorage is fallback voor de nav-tabs zonder parameter
    const raceId = new URLSearchParams(window.location.search).get('race') || sessionStorage.getItem('raceId');
    if (raceId) sessionStorage.setItem('raceId', raceId);
    const BOAT_COLORS = ['#1d4ed8', '#059669', '#d97706', '#dc2626', '#7c3aed', '#db2777', '#0891b2', '#65a30d'];

    // ── State ──
    let map;
    let allTracks = [];          // all tracks from API (unfiltered)
    let tracks = [];             // class-filtered tracks
    let compareData = [];        // /compare-data response (GPX parsed)
    let selectedBoatIdx = [0, 1];
    let renderedLines = [];
    let ghostLines = [];       // dim full tracks for context
    let trailLines = [];       // traveled portion (bright)
    let fadeSegments = [];     // tail gradient segments per boat
    let boatMarkers = [];        // Leaflet circle markers
    let currentClass = null;

    // Playback state
    let playing = false;
    let currentTime = 0;
    let totalDuration = 0;
    let playSpeed = 1;
    let animFrameId = null;
    let lastFrameTs = null;

    function getAvailableClasses(trackList) {
      const seen = new Set();
      const classes = [];
      for (const t of trackList) {
        const name = t.series_class_name || t.class_name;
        if (name && !seen.has(name)) { seen.add(name); classes.push(name); }
      }
      return classes.sort();
    }

    function findUserClass(trackList) {
      const email = getEmail();
      const userTrack = trackList.find(t => t.user_email === email);
      return userTrack ? (userTrack.series_class_name || userTrack.class_name) : null;
    }

    function applyClassFilter() {
      if (!currentClass) {
        tracks = [...allTracks];
      } else {
        tracks = allTracks.filter(t => {
          const name = t.series_class_name || t.class_name;
          return name === currentClass;
        });
      }
      if (tracks.length < 2) return false;
      selectedBoatIdx = [0, Math.min(1, tracks.length - 1)];
      return true;
    }

    function onClassChange(cls) {
      currentClass = cls || null;
      sessionStorage.setItem('compareClass', currentClass || '');
      stopPlayback();
      currentTime = 0;
      if (!applyClassFilter()) {
        document.getElementById('compare-content').innerHTML = `
          <div class="loading-state">
            <p>Minder dan 2 boten in deze klasse om te vergelijken.</p>
            <p style="margin-top:12px"><a href="#" onclick="onClassChange('');return false">Toon alle klassen</a> · <a href="race.html">Terug naar race</a></p>
          </div>`;
        return;
      }
      fetchCompareData().then(() => renderCompare());
    }

    /* ────────────────────────────────────────────────────────────────
       LOADING
       ──────────────────────────────────────────────────────────────── */

    async function loadCompare() {
      if (!raceId) {
        document.getElementById('compare-content').innerHTML =
          '<div class="loading-state"><p>Geen race geselecteerd. <a href="dashboard.html">Ga terug</a>.</p></div>';
        return;
      }

      try {
        const raceTracks = await apiGet('/races/' + raceId + '/tracks') || [];
        allTracks = Array.isArray(raceTracks) ? raceTracks : [];

        // Set default class from sessionStorage, user's class, or first class
        const savedClass = sessionStorage.getItem('compareClass');
        const userClass = findUserClass(allTracks);
        const allClasses = getAvailableClasses(allTracks);
        currentClass = savedClass || userClass || (allClasses.length > 0 ? allClasses[0] : null);

        // Te weinig boten in deze klasse? Val terug op alle klassen.
        if (currentClass && !applyClassFilter()) {
          currentClass = null;
        }

        if (!applyClassFilter() || tracks.length < 2) {
          document.getElementById('compare-content').innerHTML = `
            <div class="loading-state">
              <p>Minder dan 2 boten in deze klasse om te vergelijken.</p>
              <p style="margin-top:12px"><a href="race.html">Terug naar race</a></p>
            </div>`;
          return;
        }

        document.getElementById('breadcrumb-race-link').href = 'race.html?race=' + encodeURIComponent(raceId);
        await fetchCompareData();
        renderCompare();
      } catch (e) {
        console.error('loadCompare failed:', e.message || e);
        const msg = e.message || 'onbekende fout';
        document.getElementById('compare-content').innerHTML =
          '<div class="loading-state"><p>Kon gegevens niet laden: <code>' + escHtml(msg) + '</code>. <a href="dashboard.html">Ga terug</a>.</p></div>';
      }
    }

    async function fetchCompareData() {
      const ids = selectedBoatIdx.map(i => tracks[i].id);
      try {
        compareData = await apiPost('/races/' + raceId + '/compare-data', { track_ids: ids });
      } catch (_) {
        compareData = [];
      }

      // Compute total timeline
      let minT = Infinity, maxT = -Infinity;
      for (const cd of compareData) {
        if (cd.points.length > 0) {
          computeSmoothedHeadings(cd.points, 2);
          const t0 = new Date(cd.points[0].time).getTime();
          const t1 = new Date(cd.points[cd.points.length - 1].time).getTime();
          if (t0 < minT) minT = t0;
          if (t1 > maxT) maxT = t1;
        }
      }
      totalDuration = (maxT - minT) / 1000;
      if (totalDuration <= 0) totalDuration = 60;

      // Reset playback
      stopPlayback();
      currentTime = 0;
    }

    /* ────────────────────────────────────────────────────────────────
       RENDER UI
       ──────────────────────────────────────────────────────────────── */

    function renderCompare() {
      const classes = getAvailableClasses(allTracks);
      let classSwitcher = '';
      if (classes.length >= 1) {
        classSwitcher = `
          <div style="margin-bottom:16px">
            <select id="class-select" onchange="onClassChange(this.value)" style="padding:5px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--fg);max-width:280px;cursor:pointer">
              <option value="" ${!currentClass ? 'selected' : ''}>Alle klassen</option>
              ${classes.map(c => `<option value="${escHtml(c)}" ${c === currentClass ? 'selected' : ''}>${escHtml(c)}</option>`).join('')}
            </select>
            <span style="font-size:11px;color:var(--muted);margin-left:6px">klasse</span>
          </div>`;
      }

      const content = document.getElementById('compare-content');
      content.innerHTML = `
        ${classSwitcher}
        <div class="track-selector" id="track-selector">
          ${tracks.map((t, i) => {
            const selected = selectedBoatIdx.includes(i);
            return `
              <div class="track-chip ${selected ? 'selected' : ''}" data-idx="${i}" onclick="toggleBoat(${i})">
                <span class="chip-dot" style="background:${BOAT_COLORS[i % BOAT_COLORS.length]}"></span>
                ${escHtml(t.name || t.filename || 'Boot ' + (i+1))}
              </div>
            `;
          }).join('')}
        </div>

        <div class="playback-bar">
          <button class="btn-play" id="btn-play" onclick="togglePlay()">
            <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <span class="time-display" id="time-display">00:00</span>
          <input type="range" id="timeline" min="0" max="1000" value="0" oninput="seekTimeline(this.value)" />
          <span class="time-display" id="time-total">${fmtDuration(totalDuration)}</span>
          <div class="speed-group">
            <span class="speed-label">Snelheid</span>
            ${[1, 2, 4, 8].map(s => `
              <button class="speed-btn ${s === playSpeed ? 'active' : ''}" onclick="setSpeed(${s})">${s}&times;</button>
            `).join('')}
          </div>
        </div>

        <div class="map-section">
          <div class="map-header">
            <h4 style="display:flex;align-items:center;gap:8px">
              Gezamenlijke track-kaart
              <label style="font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;cursor:pointer;display:flex;align-items:center;gap:4px;margin-left:auto">
                <input type="checkbox" id="toggle-labels" checked style="accent-color:var(--accent)">
                Labels
              </label>
            </h4>
            <div class="map-legend" id="map-legend"></div>
          </div>
          <div id="compare-map"></div>
        </div>

        <div class="compare-grid" id="compare-cards"></div>

        <div class="chart-section">
          <div class="chart-header"><h4>Snelheidsvergelijking (knopen)</h4></div>
          <canvas id="compare-chart"></canvas>
        </div>
      `;

      renderCompareCards();
      updateLegend();
      drawAllTracks();
      drawCompareChart();
      updateTimelineUI();

      document.getElementById('time-total').textContent = fmtDuration(totalDuration);

      // Re-init map if needed (Leaflet needs the container visible)
      if (!map || map._container !== document.getElementById('compare-map')) {
        initMap();
        drawAllTracks();
        updateBoatMarkers();
      }
    }

    function renderCompareCards() {
      const container = document.getElementById('compare-cards');
      if (!container) return;

      container.innerHTML = selectedBoatIdx.map(idx => {
        const cd = compareData.find(d => d.id === tracks[idx]?.id);
        const avgKn = (cd?.avg_speed_kn ?? parseFloat(tracks[idx]?.avg_speed_knots)) || 0;
        const maxKn = (cd?.max_speed_kn ?? parseFloat(tracks[idx]?.max_speed_knots)) || 0;
        const distM = (cd?.distance_m ?? parseFloat(tracks[idx]?.distance_meters)) || 0;
        const distNm = (distM / 1852).toFixed(2);
        const pointCnt = cd ? cd.point_count : tracks[idx]?.point_count || 0;

        return `
          <div class="compare-card">
            <div class="compare-header">
              <span class="dot" style="background:${BOAT_COLORS[idx % BOAT_COLORS.length]}"></span>
              <span class="name">${escHtml(tracks[idx]?.name || tracks[idx]?.filename || 'Boot ' + (idx+1))}</span>
            </div>
            <div class="compare-body">
              <div class="compare-stat-row">
                <span class="label">Gemiddelde snelheid</span>
                <span class="value">${avgKn.toFixed(1)} kn</span>
              </div>
              <div class="compare-stat-row">
                <span class="label">Maximale snelheid</span>
                <span class="value">${maxKn.toFixed(1)} kn</span>
              </div>
              <div class="compare-stat-row">
                <span class="label">Afgelegde afstand</span>
                <span class="value">${distNm} nm</span>
              </div>
              <div class="compare-stat-row">
                <span class="label">Trackpunten</span>
                <span class="value">${pointCnt}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateLegend() {
      const legend = document.getElementById('map-legend');
      if (!legend) return;
      legend.innerHTML = selectedBoatIdx.map(i => {
        const t = tracks[i];
        return `
          <div class="legend-item">
            <span class="legend-dot" style="background:${BOAT_COLORS[i % BOAT_COLORS.length]}"></span>
            ${escHtml(t.name || t.filename || 'Boot ' + (i+1))}
          </div>
        `;
      }).join('');
    }

    /* ────────────────────────────────────────────────────────────────
       MAP
       ──────────────────────────────────────────────────────────────── */

    function initMap() {
      const el = document.getElementById('compare-map');
      if (map) { map.remove(); map = null; }

      map = L.map(el, { zoomControl: true, attributionControl: false }).setView([52.0, 4.5], 12);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18,
      }).addTo(map);

      // Force map to recalculate size
      setTimeout(() => map.invalidateSize(), 100);
    }

    function getTrackCoords(cd, idx) {
      if (cd && cd.points && cd.points.length >= 2) {
        return cd.points.map(p => [p.lat, p.lon]);
      }
      // Fallback: no real GPX data
      return [];
    }

    function drawAllTracks() {
      if (!map) return;
      clearAllLayers();

      const allBounds = [];

      selectedBoatIdx.forEach(idx => {
        const cd = compareData.find(d => d.id === tracks[idx]?.id);
        const coords = getTrackCoords(cd, idx);
        if (coords.length < 2) return;

        const color = BOAT_COLORS[idx % BOAT_COLORS.length];

        // Ghost line — dim context of the full track
        const ghost = L.polyline(coords, {
          color: color, weight: 2, opacity: 0.12,
        }).addTo(map);
        ghostLines.push(ghost);

        // Traveled trail — starts empty, grows during playback
        const trail = L.polyline([], {
          color: color, weight: 3.5, opacity: 0.8,
        }).addTo(map);
        trailLines.push(trail);

        fadeSegments.push([]);

        coords.forEach(c => allBounds.push(c));
      });

      if (allBounds.length > 0) {
        map.fitBounds(L.latLngBounds(allBounds).pad(0.1));
      }

      initBoatMarkers();
      updateBoatMarkers();
      updateTrails();
    }

    function clearAllLayers() {
      [...ghostLines, ...trailLines, ...boatMarkers].forEach(l => {
        try { map.removeLayer(l); } catch (_) {}
      });
      fadeSegments.forEach(arr => arr.forEach(l => {
        try { map.removeLayer(l); } catch (_) {}
      }));
      ghostLines = [];
      trailLines = [];
      fadeSegments = [];
      boatMarkers = [];
    }

    /* ────────────────────────────────────────────────────────────────
       BOAT MARKERS (playback) — smooth via setLatLng + CSS transition
       ──────────────────────────────────────────────────────────────── */

    function clearBoatMarkers() {
      boatMarkers.forEach(m => { try { map.removeLayer(m); } catch (_) {} });
      boatMarkers = [];
    }

    function initBoatMarkers() {
      clearBoatMarkers();

      selectedBoatIdx.forEach(idx => {
        const cd = compareData.find(d => d.id === tracks[idx]?.id);
        if (!cd || cd.points.length < 2) return;

        const color = BOAT_COLORS[idx % BOAT_COLORS.length];
        const icon = L.divIcon({
          className: 'boat-marker-icon',
          html: `<svg class="boat-icon-svg" viewBox="-10 -10 20 20" width="22" height="22" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3))"><path d="M-3,6 L3,6 L3,2 Q3,-1 2,-3 L0,-4 L-2,-3 Q-3,-1 -3,2 Z" fill="${color}" stroke="#fff" stroke-width="1.2"/></svg>`,
          iconSize: [22, 22],
          iconAnchor: [11, 11],
        });

        const marker = L.marker([0, 0], { icon }).addTo(map);
        const bName = tracks[idx]?.boat_name || tracks[idx]?.name || tracks[idx]?.filename || ('Boot ' + (idx+1));
        marker.bindTooltip(bName, {direction:'top', offset:[0,-12], permanent:true, className:'boat-tooltip'});
        boatMarkers.push(marker);
      });
    }

    function updateBoatMarkers() {
      if (!map || boatMarkers.length === 0) return;

      selectedBoatIdx.forEach((idx, markerIdx) => {
        const cd = compareData.find(d => d.id === tracks[idx]?.id);
        if (!cd || cd.points.length < 2) return;

        const marker = boatMarkers[markerIdx];
        if (!marker) return;

        const pos = interpolatePosition(cd, currentTime);
        if (!pos) return;

        // Smooth setLatLng — CSS transition handles visual tween
        marker.setLatLng([pos.lat, pos.lng]);
        const bName2 = tracks[idx]?.boat_name || tracks[idx]?.name || tracks[idx]?.filename || ('Boot ' + (idx+1));
        const hdg2 = pos.heading != null ? Math.round(pos.heading) : 0;
        marker.setTooltipContent(bName2 + '<br><span style="font-size:10px">' + pos.spd.toFixed(1) + ' kn · ' + hdg2 + '°</span>');

        // Rotate arrow to heading (0°=east, 90°=north from interpolatePosition)
        if (pos.heading != null) {
          const el = marker.getElement();
          if (el) {
            const arrow = el.querySelector('.boat-arrow');
            if (arrow) {
              arrow.style.transform = `rotate(${pos.heading.toFixed(1)}deg)`;
            }
          }
        }
      });
    }

    /* ────────────────────────────────────────────────────────────────
       TRAIL — traveled path groeit, staart vervaagt
       ──────────────────────────────────────────────────────────────── */

    function updateTrails() {
      if (!map) return;

      selectedBoatIdx.forEach((idx, bi) => {
        const cd = compareData.find(d => d.id === tracks[idx]?.id);
        if (!cd || cd.points.length < 2) return;

        const color = BOAT_COLORS[idx % BOAT_COLORS.length];
        const startTs = new Date(cd.points[0].time).getTime();
        const TAIL_SEC = 18;

        // Build traveled points and tail points
        const traveled = [];
        const tailPts = [];

        for (const pt of cd.points) {
          const t = (new Date(pt.time).getTime() - startTs) / 1000;
          if (t <= currentTime) {
            traveled.push([pt.lat, pt.lon]);
            if (t > currentTime - TAIL_SEC) {
              tailPts.push({ lat: pt.lat, lon: pt.lon, t });
            }
          } else {
            break;
          }
        }

        // Update main trail polyline
        const trail = trailLines[bi];
        if (trail) {
          trail.setLatLngs(traveled.length >= 2 ? traveled : []);
          trail.setStyle({ color, opacity: 0.8 });
        }

        // Clear old fade segments for this boat
        (fadeSegments[bi] || []).forEach(s => {
          try { map.removeLayer(s); } catch (_) {}
        });
        fadeSegments[bi] = [];

        // Draw 4-segment fading tail
        const TAIL_BANDS = 4;
        const segSize = Math.max(1, Math.ceil((tailPts.length - 1) / TAIL_BANDS));

        for (let s = 0; s < TAIL_BANDS; s++) {
          const start = s * segSize;
          const end = Math.min((s + 1) * segSize, tailPts.length - 1);
          if (end <= start) continue;

          const pts = tailPts.slice(start, end + 1).map(p => [p.lat, p.lon]);
          const frac = (s + 1) / TAIL_BANDS; // 0.25 → 1.0
          const opacity = 0.05 + frac * 0.55;   // 0.05 → 0.60

          const seg = L.polyline(pts, {
            color, weight: 3.5, opacity,
          }).addTo(map);
          fadeSegments[bi].push(seg);
        }
      });
    }

    function computeSmoothedHeadings(points, windowSize) {
      // Bereken heading voor elk punt als bearing over windowSize punten vooruit/achteruit.
      // Stopt bij GPS-gaten (>5 sec) om te voorkomen dat de koers over een gat heen
      // een verkeerde richting krijgt.
      const n = points.length;
      const MAX_GAP = 5; // seconden
      for (let i = 0; i < n; i++) {
        let lo = i, hi = i;
        for (let s = 0; s < windowSize && lo > 0; s++) {
          const gap = points[lo].time && points[lo-1].time
            ? (new Date(points[lo].time) - new Date(points[lo-1].time)) / 1000 : 0;
          if (gap > MAX_GAP) break;
          lo--;
        }
        for (let s = 0; s < windowSize && hi < n-1; s++) {
          const gap = points[hi+1].time && points[hi].time
            ? (new Date(points[hi+1].time) - new Date(points[hi].time)) / 1000 : 0;
          if (gap > MAX_GAP) break;
          hi++;
        }
        const latRad = (points[lo].lat + points[hi].lat) / 2 * Math.PI / 180;
        const dLon = (points[hi].lon - points[lo].lon) * Math.cos(latRad);
        const dLat = points[hi].lat - points[lo].lat;
        points[i]._hdg = (Math.atan2(dLon, dLat) * 180 / Math.PI + 360) % 360;
      }
    }

    /**
     * Interpoleer positie op een gegeven relatieve tijd (seconden vanaf
     * vroegste starttijd van alle tracks).
     */
    function interpolatePosition(cd, relTime) {
      if (!cd.points || cd.points.length < 2) return null;

      const startTs = new Date(cd.points[0].time).getTime();
      const endTs = new Date(cd.points[cd.points.length - 1].time).getTime();
      const trackDuration = (endTs - startTs) / 1000;

      const targetTs = startTs + relTime * 1000;

      // Before first point or after last point
      if (relTime <= 0) {
        return { lat: cd.points[0].lat, lng: cd.points[0].lon, heading: cd.points[0]._hdg || null, spd: cd.points[0].speed_kn || 0 };
      }
      if (relTime >= trackDuration) {
        const last = cd.points[cd.points.length - 1];
        return { lat: last.lat, lng: last.lon, heading: last._hdg || null, spd: last.speed_kn || 0 };
      }

      // Find the two points the target time falls between
      for (let i = 0; i < cd.points.length - 1; i++) {
        const t0 = new Date(cd.points[i].time).getTime();
        const t1 = new Date(cd.points[i + 1].time).getTime();

        if (targetTs >= t0 && targetTs <= t1) {
          const segDuration = t1 - t0;
          const frac = segDuration > 0 ? (targetTs - t0) / segDuration : 0;

          return {
            lat: cd.points[i].lat + (cd.points[i + 1].lat - cd.points[i].lat) * frac,
            lng: cd.points[i].lon + (cd.points[i + 1].lon - cd.points[i].lon) * frac,
            heading: cd.points[i]._hdg != null ? cd.points[i]._hdg : null,
            spd: (cd.points[i].speed_kn || 0) + ((cd.points[i+1].speed_kn || 0) - (cd.points[i].speed_kn || 0)) * frac,
          };
        }
      }

      return null;
    }

    /* ────────────────────────────────────────────────────────────────
       PLAYBACK CONTROLS
       ──────────────────────────────────────────────────────────────── */

    function togglePlay() {
      if (playing) { stopPlayback(); } else { startPlayback(); }
    }

    function startPlayback() {
      if (currentTime >= totalDuration) {
        currentTime = 0;
        updateBoatMarkers();
        updateTrails();
        drawCompareChart();
      }
      playing = true;
      lastFrameTs = performance.now();
      updatePlayButton();
      animLoop(lastFrameTs);
    }

    function stopPlayback() {
      playing = false;
      if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      updatePlayButton();
    }

    function animLoop(now) {
      if (!playing) return;

      const dt = (now - lastFrameTs) / 1000; // real-time seconds
      lastFrameTs = now;

      currentTime += dt * playSpeed;
      if (currentTime >= totalDuration) {
        currentTime = totalDuration;
        stopPlayback();
      }

      updateBoatMarkers();
      updateTrails();
      updateTimelineUI();
      drawCompareChart(); // update cursor

      animFrameId = requestAnimationFrame(animLoop);
    }

    function seekTimeline(val) {
      currentTime = (val / 1000) * totalDuration;
      if (currentTime >= totalDuration) currentTime = totalDuration;
      updateBoatMarkers();
      updateTrails();
      updateTimelineUI();
      drawCompareChart();
    }

    function setSpeed(s) {
      playSpeed = s;
      document.querySelectorAll('.speed-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.textContent) === s);
      });
    }

    function updateTimelineUI() {
      const slider = document.getElementById('timeline');
      const display = document.getElementById('time-display');
      if (slider) slider.value = totalDuration > 0 ? Math.round((currentTime / totalDuration) * 1000) : 0;
      if (display) display.textContent = fmtDuration(currentTime);
    }

    function updatePlayButton() {
      const play = document.getElementById('icon-play');
      const pause = document.getElementById('icon-pause');
      if (play) play.style.display = playing ? 'none' : '';
      if (pause) pause.style.display = playing ? '' : 'none';
    }

    /* ────────────────────────────────────────────────────────────────
       SPEED CHART
       ──────────────────────────────────────────────────────────────── */

    function drawCompareChart() {
      const canvas = document.getElementById('compare-chart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = rect.width - 40;
      const h = 260;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);

      const padding = { top: 16, bottom: 28, left: 44, right: 16 };
      const chartW = w - padding.left - padding.right;
      const chartH = h - padding.top - padding.bottom;

      // Build speed data from real GPX points
      const allSeries = [];
      let globalMaxSpeed = 2;

      for (let si = 0; si < selectedBoatIdx.length; si++) {
        const idx = selectedBoatIdx[si];
        const cd = compareData.find(d => d.id === tracks[idx]?.id);
        if (!cd || cd.points.length < 2) continue;

        // Map points to { timeOffset, speed_kn }
        const startTs = new Date(cd.points[0].time).getTime();
        const data = [];
        for (const pt of cd.points) {
          if (pt.speed_kn != null) {
            const t = (new Date(pt.time).getTime() - startTs) / 1000;
            data.push({ t, v: pt.speed_kn });
          }
        }
        if (data.length < 2) continue;

        allSeries.push({
          data,
          color: BOAT_COLORS[idx % BOAT_COLORS.length],
          name: tracks[idx]?.name || tracks[idx]?.filename || 'Boot ' + (idx+1),
        });

        for (const d of data) { if (d.v > globalMaxSpeed) globalMaxSpeed = d.v; }
      }

      globalMaxSpeed = Math.max(globalMaxSpeed, 2);

      // Nice Y-axis max
      const niceMax = globalMaxSpeed <= 2 ? Math.ceil(globalMaxSpeed) :
                      globalMaxSpeed <= 5 ? Math.ceil(globalMaxSpeed) :
                      Math.ceil(globalMaxSpeed / 5) * 5;
      const ySteps = niceMax <= 3 ? 3 : niceMax <= 6 ? 3 : 5;
      const yStep = niceMax / ySteps;

      function xPos(t) { return padding.left + (t / totalDuration) * chartW; }
      function yPos(v) { return padding.top + chartH - (v / niceMax) * chartH; }

      ctx.clearRect(0, 0, w, h);

      // Grid
      ctx.strokeStyle = 'rgba(71, 85, 105, 0.2)';
      ctx.lineWidth = 1;
      ctx.fillStyle = 'rgba(71, 85, 105, 0.5)';
      ctx.font = '10px "JetBrains Mono", monospace';
      ctx.textAlign = 'right';
      for (let k = 0; k <= ySteps; k++) {
        const v = k * yStep;
        const y = yPos(v);
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();
        ctx.fillText((Number.isInteger(v) ? v : v.toFixed(1)) + ' kn', padding.left - 6, y + 3);
      }

      // Time axis labels
      ctx.fillStyle = 'rgba(71, 85, 105, 0.5)';
      ctx.font = '10px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      const labelCount = 6;
      for (let i = 0; i <= labelCount; i++) {
        const t = (i / labelCount) * totalDuration;
        ctx.fillText(fmtDuration(t), xPos(t), h - 6);
      }

      // Speed lines
      for (const series of allSeries) {
        ctx.beginPath();
        ctx.moveTo(xPos(series.data[0].t), yPos(series.data[0].v));
        for (let i = 1; i < series.data.length; i++) {
          ctx.lineTo(xPos(series.data[i].t), yPos(series.data[i].v));
        }
        ctx.strokeStyle = series.color;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // Cursor line (vertical)
      const cx = xPos(currentTime);
      ctx.beginPath();
      ctx.moveTo(cx, padding.top);
      ctx.lineTo(cx, padding.top + chartH);
      ctx.strokeStyle = 'rgba(71, 85, 105, 0.6)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    /* ────────────────────────────────────────────────────────────────
       BOAT TOGGLE
       ──────────────────────────────────────────────────────────────── */

    async function toggleBoat(idx) {
      if (selectedBoatIdx.includes(idx)) {
        if (selectedBoatIdx.length <= 2) return;
        selectedBoatIdx = selectedBoatIdx.filter(i => i !== idx);
      } else {
        if (selectedBoatIdx.length >= 4) return;
        selectedBoatIdx.push(idx);
      }

      stopPlayback();
      currentTime = 0;

      await fetchCompareData();
      renderCompare();
    }

    /* ────────────────────────────────────────────────────────────────
       INIT
       ──────────────────────────────────────────────────────────────── */

    loadCompare();

    document.getElementById('toggle-labels')?.addEventListener('change', (e) => {
      const mapEl = document.getElementById('compare-map');
      if (mapEl) {
        if (e.target.checked) {
          mapEl.classList.remove('hide-labels');
        } else {
          mapEl.classList.add('hide-labels');
        }
      }
    });

    window.addEventListener('resize', () => {
      if (map) map.invalidateSize();
      if (compareData.length) drawCompareChart();
    });

    // ── Fullscreen overlay ──────────────────────────────────────────────────
    let fsMap = null;
    let fsMarkers = [];
    let fsTrails = {};
    let fsPlaying = false;
    let fsSpeed = 1;
    let fsCurrentTime = 0;
    let fsAnimFrame = null;
    let fsLastFrameTs = 0;

    function openFullscreen() {
      const overlay = document.getElementById('fullscreen-overlay');
      overlay.classList.add('active');

      const raceName = document.getElementById('breadcrumb-race-link')?.textContent || 'Race';
      document.getElementById('fs-title').textContent = 'Vergelijken — ' + raceName;

      renderFsBoatTable();

      // Labels toggle for fullscreen map
      document.getElementById('fs-toggle-labels')?.addEventListener('change', (e) => {
        const mapEl = document.getElementById('fs-map-container');
        if (mapEl) {
          mapEl.classList.toggle('hide-labels', !e.target.checked);
        }
      });

      setTimeout(() => {
        if (fsMap) { fsMap.remove(); fsMap = null; }
        fsMap = L.map('fs-map-container', { zoomControl: true }).setView([52.3, 5.5], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(fsMap);

        fsMarkers = [];
        fsTrails = {};
        compareData.forEach((cd, i) => {
          if (!cd.points || !cd.points.length) return;
          const color = BOAT_COLORS[i % BOAT_COLORS.length];
          fsTrails[i] = L.polyline([], { color, weight: 2, opacity: 0.6 }).addTo(fsMap);
          const icon = L.divIcon({
            className: '',
            html: `<div style="width:12px;height:12px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.4)"></div>`,
            iconSize: [12, 12], iconAnchor: [6, 6]
          });
          const pt = cd.points[0];
          const marker = L.marker([pt.lat, pt.lon], { icon }).addTo(fsMap);
          const name = tracks[i] ? (tracks[i].boat_name || tracks[i].name || tracks[i].filename || `Boot ${i+1}`) : `Boot ${i+1}`;
          marker.bindTooltip(escHtml(name) + '<br><span style="font-size:10px">0.0 kn · 0°</span>', { permanent: true, direction: 'top', offset: [0, -12], className: 'boat-tooltip' });
          fsMarkers.push({ marker, color, name });
        });

        if (fsMarkers.length) {
          const fg = L.featureGroup(fsMarkers.map(m => m.marker));
          fsMap.fitBounds(fg.getBounds().pad(0.1));
        }

        const slider = document.getElementById('fs-slider');
        slider.max = Math.round(totalDuration);
        slider.value = 0;
        updateFsTime(0);
      }, 100);
    }

    function closeFullscreen() {
      document.getElementById('fullscreen-overlay').classList.remove('active');
      stopFsPlayback();
      if (fsMap) { fsMap.remove(); fsMap = null; }
      fsMarkers = [];
      fsTrails = {};
    }

    function renderFsBoatTable() {
      const tbody = document.getElementById('fs-boat-tbody');
      tbody.innerHTML = compareData.map((cd, i) => {
        const name = tracks[i] ? escHtml(tracks[i].boat_name || tracks[i].name || tracks[i].filename || `Boot ${i+1}`) : `Boot ${i+1}`;
        return `<tr data-idx="${i}">
          <td class="td-name" style="color:${BOAT_COLORS[i % BOAT_COLORS.length]}">${name}</td>
          <td class="td-num" id="fs-spd-${i}">—</td>
          <td class="td-num" id="fs-hdg-${i}">—</td>
        </tr>`;
      }).join('');
    }

    function updateFsTime(timeSec) {
      fsCurrentTime = timeSec;
      document.getElementById('fs-time-display').textContent = fmtDuration(Math.round(timeSec));

      compareData.forEach((cd, i) => {
        if (!cd.points || !cd.points.length) return;
        const pos = interpolatePosition(cd, timeSec);
        if (pos && fsMarkers[i]) {
          fsMarkers[i].marker.setLatLng([pos.lat, pos.lng]);
          // Update tooltip with live speed + heading
          const hdg = pos.heading != null ? Math.round(pos.heading) : 0;
          const spd = pos.speed != null ? pos.speed.toFixed(1) : '0.0';
          fsMarkers[i].marker.setTooltipContent(escHtml(fsMarkers[i].name) + '<br><span style="font-size:10px">' + spd + ' kn · ' + hdg + '°</span>');
          const trail = fsTrails[i];
          if (trail) {
            const traveled = cd.points.filter(p => p.time >= 0 && p.time <= timeSec);
            trail.setLatLngs(traveled.map(p => [p.lat, p.lon]));
          }
        }
        const spdEl = document.getElementById(`fs-spd-${i}`);
        const hdgEl = document.getElementById(`fs-hdg-${i}`);
        if (spdEl && pos) spdEl.textContent = pos.speed != null ? pos.speed.toFixed(1) : '—';
        if (hdgEl && pos) hdgEl.textContent = pos.heading != null ? Math.round(pos.heading) + '°' : '—';
      });
    }

    function toggleFsPlayback() {
      if (fsPlaying) stopFsPlayback();
      else startFsPlayback();
    }

    function startFsPlayback() {
      fsPlaying = true;
      fsLastFrameTs = performance.now();
      document.getElementById('fs-play-btn').textContent = '⏸';
      fsAnimLoop(fsLastFrameTs);
    }

    function stopFsPlayback() {
      fsPlaying = false;
      if (fsAnimFrame) { cancelAnimationFrame(fsAnimFrame); fsAnimFrame = null; }
      document.getElementById('fs-play-btn').textContent = '▶';
    }

    function fsAnimLoop(ts) {
      if (!fsPlaying) return;
      const dt = (ts - fsLastFrameTs) / 1000;
      fsLastFrameTs = ts;
      fsCurrentTime += dt * fsSpeed;
      if (fsCurrentTime >= totalDuration) {
        fsCurrentTime = totalDuration;
        stopFsPlayback();
      }
      document.getElementById('fs-slider').value = Math.round(fsCurrentTime);
      updateFsTime(fsCurrentTime);
      if (fsPlaying) fsAnimFrame = requestAnimationFrame(fsAnimLoop);
    }

    function fsSetSpeed(s) {
      fsSpeed = s;
      document.querySelectorAll('#fs-bottombar .speed-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.speed) === s);
      });
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const overlay = document.getElementById('fullscreen-overlay');
        if (overlay.classList.contains('active')) {
          e.preventDefault();
          closeFullscreen();
        }
      }
    });
  </script>

  <!-- Fullscreen overlay -->
  <div id="fullscreen-overlay" class="fullscreen-overlay">
    <div class="fs-topbar">
      <h3 id="fs-title">Vergelijken</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:11px;font-weight:400;cursor:pointer;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="fs-toggle-labels" checked style="accent-color:var(--accent)">
          Labels
        </label>
        <button class="fs-exit" onclick="closeFullscreen()">✕ Sluiten (Esc)</button>
      </div>
    </div>
    <div class="fs-body">
      <div class="fs-sidebar">
        <h4>Boten</h4>
        <table class="fs-boat-table">
          <thead><tr>
            <th>Naam</th>
            <th style="text-align:right">Kn</th>
            <th style="text-align:right">°</th>
          </tr></thead>
          <tbody id="fs-boat-tbody"></tbody>
        </table>
      </div>
      <div class="fs-map">
        <div id="fs-map-container"></div>
      </div>
    </div>
    <div class="fs-bottombar" id="fs-bottombar">
      <button class="play-btn" id="fs-play-btn" onclick="toggleFsPlayback()">▶</button>
      <span class="time-display" id="fs-time-display">00:00</span>
      <input type="range" id="fs-slider" min="0" max="1000" value="0" oninput="updateFsTime(parseInt(this.value))" />
      <div class="speed-group">
        <button class="speed-btn active" data-speed="1" onclick="fsSetSpeed(1)">1×</button>
        <button class="speed-btn" data-speed="2" onclick="fsSetSpeed(2)">2×</button>
        <button class="speed-btn" data-speed="5" onclick="fsSetSpeed(5)">5×</button>
        <button class="speed-btn" data-speed="10" onclick="fsSetSpeed(10)">10×</button>
      </div>
    </div>
  </div>
</body>
</html>
